# cabis-billing — Cloudflare Worker（キャビス課金バックエンド）
# デプロイ: dev   = `wrangler deploy`            → cabis-billing-dev
#           prod  = `wrangler deploy --env production` → cabis-billing
#
# 非機密の設定は [vars]、機密は `wrangler secret put` で投入する。
#   wrangler secret put STRIPE_SECRET_KEY
#   wrangler secret put STRIPE_WEBHOOK_SECRET
#   wrangler secret put FIREBASE_SERVICE_ACCOUNT
#   wrangler secret put RESEND_API_KEY   # ヒアリング申請の通知メール送信（Resend）
# （prod は各コマンドに --env production を付ける）
#
# メール送信元 MAIL_FROM のドメイン(taxicabis.com)は Resend で要ドメイン検証
# （SPF + DKIM の DNS レコード追加）。

name = "cabis-billing-dev"
main = "src/index.js"
compatibility_date = "2025-01-01"

# --- dev（既定）: Stripe テストモード × Firebase dev プロジェクト ---
[vars]
FIREBASE_PROJECT_ID = "taxi-dailydata-dev"
STRIPE_PRICE_ID = "price_1TYYNKGtKUEpwNTvjuqwpjEw"
APP_BASE_URL = "https://hidenaka.github.io/-taxi-daily-report-dev"
ALLOWED_ORIGIN = "https://hidenaka.github.io"
MAIL_FROM = "noreply@taxicabis.com"
MAIL_TO = "haqei64384@gmail.com"
# ADMIN_UIDS: Firebase Auth UID リスト（カンマ区切り）。
# `npm run admin:list` で adminUids コレクションから取得した実 UID。
ADMIN_UIDS = "7tLCsySjR8c7U60GRXrlGGMdkHD2"

# --- production: Stripe ライブモード × Firebase 本番プロジェクト ---
[env.production]
name = "cabis-billing"

[env.production.vars]
FIREBASE_PROJECT_ID = "taxi-dailydata"
# ↓ Live モードで Product/Price を再作成したら差し替える
STRIPE_PRICE_ID = "price_LIVE_PLACEHOLDER"
APP_BASE_URL = "https://app.taxicabis.com"
ALLOWED_ORIGIN = "https://app.taxicabis.com"
MAIL_FROM = "noreply@taxicabis.com"
MAIL_TO = "haqei64384@gmail.com"
# ADMIN_UIDS: Firebase Auth UID リスト（カンマ区切り）。
# `npm run admin:list -- --project=taxi-dailydata` で adminUids コレクションから取得した実 UID。
ADMIN_UIDS = "kbCfUozleZYLkIdej3VT2KS60pg2"
