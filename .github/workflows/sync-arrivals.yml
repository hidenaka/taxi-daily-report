name: Sync Arrivals from taxi-ic-helper

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          path: dest

      - name: Checkout taxi-ic-helper (data source)
        uses: actions/checkout@v4
        with:
          repository: hidenaka/taxi-ic-helper
          path: src

      - name: Copy arrivals.json
        run: |
          mkdir -p dest/tools/data
          cp src/data/arrivals.json dest/tools/data/arrivals.json

      - name: Commit if changed
        working-directory: dest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for i in 1 2 3; do
            if [ -z "$(git status --porcelain tools/data/arrivals.json)" ]; then
              echo "No change. Skipping commit."
              exit 0
            fi
            git add tools/data/arrivals.json
            git commit -m "chore(arrivals): sync from taxi-ic-helper $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')" || true
            if git push; then
              exit 0
            fi
            echo "push failed (attempt $i): refresh and re-copy"
            git fetch origin main
            git reset --hard origin/main
            cp ../src/data/arrivals.json tools/data/arrivals.json
            sleep $((i * 3))
          done
          echo "push failed after 3 retries"
          exit 1
