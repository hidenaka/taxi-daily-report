name: Deploy to Production
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Deploy to production? (yes/no)'
        required: true
        default: 'no'
jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'yes'
    
    steps:
      - name: Checkout dev repo
        uses: actions/checkout@v4
        with:
          path: dev
          
      - name: Checkout prod repo
        uses: actions/checkout@v4
        with:
          repository: hidenaka/taxi-daily-report
          token: ${{ secrets.PROD_DEPLOY_TOKEN }}
          path: prod
          
      - name: Copy files to prod
        run: |
          rsync -av --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='docs/' \
            --exclude='scripts/' \
            --exclude='.opencode/' \
            --exclude='.DS_Store' \
            --exclude='node_modules/' \
            dev/ prod/
          
      - name: Commit and push to prod
        working-directory: prod
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "deploy: sync from dev repo (${{ github.sha }})"
            git push origin main
          fi
          
      - name: Deployment complete
        run: echo "Production deployment complete"
