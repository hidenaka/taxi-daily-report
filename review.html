<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>振り返り — タクシー日報</title>
<link rel="stylesheet" href="css/style.css">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="manifest" href="manifest.webmanifest">
<style>
.range-tabs { display: flex; gap: 4px; margin-bottom: 8px; }
.range-tabs button { flex: 1; background: #f0f0f0; color: #333; border: none; padding: 8px; border-radius: 4px; font-size: 12px; cursor: pointer; }
.range-tabs button.active { background: var(--primary); color: #fff; font-weight: 600; }

.heat { display: grid; grid-template-columns: 30px repeat(4, 1fr); gap: 2px; font-size: 11px; }
.heat .h { padding: 4px 2px; text-align: center; color: var(--muted); font-size: 10px; }
.heat .lbl { padding: 6px 2px; color: var(--muted); font-weight: 600; text-align: center; font-size: 11px; }
.heat .cell { padding: 8px 2px; text-align: center; border-radius: 3px; font-weight: 600; }

.rank-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.rank-table th, .rank-table td { padding: 5px 4px; border-bottom: 1px solid #eee; text-align: right; }
.rank-table th { color: var(--muted); font-size: 10px; font-weight: 600; }
.rank-table td.l, .rank-table th.l { text-align: left; }
.rank-table tr { cursor: pointer; }
.rank-table tr:hover { background: #fafafa; }
.rank-table .rank { color: var(--muted); width: 22px; }
.rank-table .gold { background: #fff8e1; }
.rank-table .red { background: #ffebee; }

.wbar { display: grid; grid-template-columns: 50px 1fr 80px; gap: 6px; align-items: center; font-size: 12px; padding: 4px 0; }
.wbar .bar { height: 18px; background: var(--green); border-radius: 3px; }
.wbar.cloudy .bar { background: #90a4ae; }
.wbar.rainy .bar { background: #5c6bc0; }
.wbar.snowy .bar { background: #b0bec5; }
.wbar .v { text-align: right; font-weight: 600; }
.wbar .lbl { color: var(--muted); }

.trend-svg { width: 100%; height: 130px; }
.trend-line { fill: none; stroke: var(--primary); stroke-width: 2; }
.trend-dot { fill: var(--primary); }
.trend-axis { stroke: #ddd; stroke-width: 1; }
.trend-label { font-size: 9px; fill: var(--muted); }
.trend-month { font-size: 9px; fill: var(--muted); }

.metric-tabs { display: flex; gap: 4px; margin-bottom: 6px; }
.metric-tabs button { flex: 1; background: #f0f0f0; color: #333; border: none; padding: 6px; border-radius: 4px; font-size: 11px; }
.metric-tabs button.active { background: var(--primary); color: #fff; }

.loading { padding: 30px; text-align: center; color: var(--muted); }
.section-h { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
.section-h .desc { font-size: 10px; color: var(--muted); }

.detail-tip { background: #fff8e1; border: 1px solid #ffd54f; border-radius: 4px; padding: 8px; margin-top: 8px; font-size: 12px; line-height: 1.5; min-height: 24px; display:none; }
.detail-tip.show { display: block; }
.detail-tip strong { color: #f57f17; }
.heat .cell, .wbar .bar, .trend-dot, .heat-touch { cursor: pointer; }
.heat-touch { transform: scale(1); transition: transform 0.1s; }
.heat-touch:active { transform: scale(0.95); }
</style>
</head>
<body>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
}
// GitHub版廃止: 古いtoken/repoが残っていれば削除
localStorage.removeItem('github_token');
localStorage.removeItem('github_data_repo');
</script>
<main style="padding:14px;">
  <h1 style="margin-top:0;">分析</h1>
  <div style="display:flex;gap:4px;margin-bottom:12px;">
    <a href="support.html" style="flex:1;background:#f0f0f0;color:#333;text-align:center;padding:8px;border-radius:4px;font-size:12px;font-weight:600;text-decoration:none;">営業サポート</a>
    <a href="review.html" style="flex:1;background:var(--primary);color:#fff;text-align:center;padding:8px;border-radius:4px;font-size:12px;font-weight:600;text-decoration:none;">振り返り</a>
  </div>

  <section class="card">
    <div class="section-h">
      <strong>分析期間</strong>
      <span class="desc">過去N月度のデータで分析</span>
    </div>
    <div class="range-tabs">
      <button data-months="3">3ヶ月</button>
      <button data-months="6" class="active">6ヶ月</button>
      <button data-months="12">12ヶ月</button>
    </div>
    <div id="rangeInfo" class="muted" style="font-size:11px;"></div>
  </section>

  <section class="card" id="trendCard">
    <div class="section-h">
      <strong>月度トレンド</strong>
      <span class="desc">改善/悪化を一目で</span>
    </div>
    <div class="metric-tabs" id="metricTabs">
      <button data-m="total" class="active">総支給</button>
      <button data-m="sales">売上(税込)</button>
      <button data-m="hourly">時間単価</button>
      <button data-m="shifts">乗務数</button>
    </div>
    <svg class="trend-svg" id="trendSvg"></svg>
    <div id="trendLegend" class="muted" style="font-size:11px;"></div>
    <div class="detail-tip" id="trendTip"></div>
  </section>

  <section class="card" id="dowCard">
    <div class="section-h">
      <strong>曜日別 平均パフォーマンス</strong>
      <span class="desc">どの曜日が稼げるか</span>
    </div>
    <div id="dowBody"></div>
    <div id="dowDetailPanel" style="display:none;margin-top:12px;border-top:1px dashed #ddd;padding-top:12px;">
      <div id="dowDateList" style="margin-bottom:12px;"></div>
      <div id="dowDayCard"></div>
    </div>
  </section>

  <section class="card" id="heatCard"
    <div class="section-h">
      <strong>曜日 × 時間帯 平均時間単価（¥/h）</strong>
      <span class="desc">時間帯別の時間単価平均</span>
    </div>
    <div id="heatBody"></div>
    <div class="detail-tip" id="heatTip"></div>
    <p class="muted" style="font-size:10px;margin-top:6px;">数字は<strong>1時間あたり平均営収（¥/h）</strong>。実稼働時間（休憩除く）で換算。タップで詳細</p>
  </section>

  <section class="card" id="weatherCard">
    <div class="section-h">
      <strong>天気別 平均日売上</strong>
      <span class="desc">天気と稼ぎの関係</span>
    </div>
    <div id="weatherBody"></div>
    <div class="detail-tip" id="weatherTip"></div>
  </section>

  <section class="card" id="bestCard">
    <div class="section-h">
      <strong>ベストデイ TOP10</strong>
      <span class="desc">再現性のある勝ちパターン</span>
    </div>
    <div id="bestBody"></div>
  </section>

  <section class="card" id="worstCard">
    <div class="section-h">
      <strong>ワーストデイ TOP10</strong>
      <span class="desc">何が起きていたか</span>
    </div>
    <div id="worstBody"></div>
  </section>

  <section class="card" id="memoCard">
    <div class="section-h">
      <strong>振り返りメモ一覧</strong>
      <span class="desc">過去の気づき</span>
    </div>
    <div id="memoBody"></div>
  </section>
</main>
<div id="navHost"></div>
<script type="module">
import { renderBottomNav, formatYen, formatDate, formatDateY, currentBillingPeriod, formatBillingPeriod, shiftBillingPeriod } from './js/app.js';
import { getDrivesForMonth, getDrivesForMonthCached, getConfig, getConfigCached } from './js/storage.js';
import { calcDailySales, calcTotalPay, calcMonthlySales } from './js/payroll.js';
import { calcTimeBreakdown, dowPeriodMatrix, dowZoneMatrix, dowZoneEfficiency, dowAggregation, rankDrivesBySales, weatherSalesAggregation, WEATHER_LABELS, DOW_LABELS, isSummaryOnly, formatMin, ZONE_PRESETS, formatZoneRange, getShiftZones, dowOf, calcZoneBreakdown } from './js/chart-helpers.js';

document.getElementById('navHost').innerHTML = renderBottomNav('analytics');

let monthsRange = 6;
let allDrives = [];
let monthSummaries = []; // [{ym, drives, totalSales, totalShifts, totalPay, totalTripMin, ...}]
let config = null;
let selectedMetric = 'total';
let heatZonePreset = 'shift'; // 'human' | 'shift'

document.querySelectorAll('.range-tabs button').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('.range-tabs button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    monthsRange = parseInt(b.dataset.months);
    load();
  };
});
document.querySelectorAll('#metricTabs button').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('#metricTabs button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    selectedMetric = b.dataset.m;
    renderTrend();
  };
});

function buildMonthSummaries(periods, drivesByMonth) {
  monthSummaries = [];
  allDrives = [];
  for (let i = 0; i < periods.length; i++) {
    const ym = periods[i];
    const drives = drivesByMonth[i] || [];
    allDrives.push(...drives);
    const monthly = calcMonthlySales(drives);
    const pay = calcTotalPay(drives, config);
    const detailed = drives.filter(d => !isSummaryOnly(d));
    let totalMin = 0;
    for (const d of detailed) totalMin += calcTimeBreakdown(d).totalMin;
    monthSummaries.push({
      ym, drives,
      totalSales: monthly.inclTax,
      totalShifts: drives.length,
      totalPay: pay.total,
      totalShiftMin: totalMin,
      hourly: totalMin > 0 ? monthly.inclTax / (totalMin / 60) : 0
    });
  }
}

function renderAll(periods, label) {
  document.getElementById('rangeInfo').textContent =
    `${formatBillingPeriod(periods[0])} 〜 ${formatBillingPeriod(periods[periods.length-1])} (${allDrives.length}乗務)${label || ''}`;
  renderTrend();
  renderDow();
  renderHeatmap();
  renderWeather();
  renderRanks();
  renderMemos();
}

async function load() {
  const current = currentBillingPeriod();
  const periods = [];
  for (let i = monthsRange - 1; i >= 0; i--) {
    periods.push(shiftBillingPeriod(current, -i));
  }

  // === Phase 1: キャッシュから即時描画 ===
  const cachedConfig = getConfigCached();
  const cachedByMonth = periods.map(ym => getDrivesForMonthCached(ym));
  const cacheComplete = cachedConfig && cachedByMonth.every(d => d !== null);
  if (cacheComplete) {
    config = cachedConfig;
    buildMonthSummaries(periods, cachedByMonth);
    renderAll(periods, ' · 同期中…');
  } else {
    document.getElementById('rangeInfo').textContent = '読み込み中…';
  }

  // === Phase 2: バックグラウンドで最新を取得 ===
  try {
    const [freshConfig, ...freshByMonth] = await Promise.all([
      getConfig(),
      ...periods.map(ym => getDrivesForMonth(ym))
    ]);
    config = freshConfig;
    buildMonthSummaries(periods, freshByMonth);
    renderAll(periods, '');
  } catch (e) {
    if (!cacheComplete) {
      document.getElementById('rangeInfo').textContent = `読み込み失敗: ${e.message}`;
    }
  }
}

function renderDow() {
  const agg = dowAggregation(allDrives);
  const max = Math.max(...agg.map(a => a.days > 0 ? a.totalSales / a.days : 0), 1);
  let html = '<div style="overflow-x:auto;"><table class="rank-table">' +
    '<thead><tr><th class="l">曜</th><th>日数</th><th>平均営収</th><th>平均件数</th><th>平均時間単価</th><th>平均乗務</th><th>ベスト</th></tr></thead><tbody>';
  for (let dow = 0; dow < 7; dow++) {
    const a = agg[dow];
    if (a.days === 0) {
      html += `<tr><td class="l" style="color:${dow===0?'#d32f2f':dow===6?'#1976d2':'#999'};">${DOW_LABELS[dow]}</td><td colspan="6" style="color:#ccc;">—</td></tr>`;
      continue;
    }
    const avgSales = a.totalSales / a.days;
    const avgCount = a.totalCount / a.days;
    const avgHourly = a.totalShiftMin > 0 ? a.totalSales / (a.totalShiftMin / 60) : 0;
    const avgShiftMin = a.totalShiftMin / a.days;
    const pct = (avgSales / max) * 100;
    html += `<tr style="cursor:pointer;" onclick="showDowDates(${dow})">
      <td class="l" style="color:${dow===0?'#d32f2f':dow===6?'#1976d2':''};font-weight:600;">${DOW_LABELS[dow]}</td>
      <td>${a.days}</td>
      <td><div style="position:relative;background:#f0f0f0;border-radius:3px;height:18px;min-width:80px;">
        <div style="position:absolute;left:0;top:0;height:100%;width:${pct}%;background:var(--green);border-radius:3px;"></div>
        <div style="position:relative;line-height:18px;font-size:10px;text-align:right;padding-right:4px;font-weight:600;">${formatYen(avgSales)}</div>
      </div></td>
      <td>${avgCount.toFixed(1)}</td>
      <td>${formatYen(avgHourly)}</td>
      <td>${formatMin(avgShiftMin)}</td>
      <td><strong>${formatYen(a.bestSales)}</strong></td>
    </tr>`;
  }
  html += '</tbody></table></div>';
  document.getElementById('dowBody').innerHTML = html;
}

function showDowDates(dow) {
  const agg = dowAggregation(allDrives);
  const a = agg[dow];
  const panel = document.getElementById('dowDetailPanel');
  const listDiv = document.getElementById('dowDateList');
  const cardDiv = document.getElementById('dowDayCard');

  if (!a || a.days === 0) {
    panel.style.display = 'none';
    return;
  }

  // 日付リストをテーブル表示（新しい順）
  let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
    <strong style="font-size:13px;color:${dow===0?'#d32f2f':dow===6?'#1976d2':''};">${DOW_LABELS[dow]}曜日の営業日（${a.days}日）</strong>
    <button onclick="document.getElementById('dowDetailPanel').style.display='none';" style="background:#f0f0f0;border:none;padding:4px 8px;border-radius:4px;font-size:11px;cursor:pointer;">閉じる</button>
  </div>
  <div style="overflow-x:auto;">
  <table class="rank-table" style="font-size:11px;">
    <thead><tr><th class="l">日付</th><th>件数</th><th>売上</th><th>時間単価</th><th>乗務時間</th></tr></thead>
    <tbody>`;
  for (const d of a.dates) {
    const hourly = d.shiftMin > 0 ? d.sales / (d.shiftMin / 60) : 0;
    html += `<tr style="cursor:pointer;" onclick="renderDayDetail('${d.date}')">
      <td class="l" style="font-weight:600;">${formatDateY(d.date)}</td>
      <td>${d.count}</td>
      <td><strong>${formatYen(d.sales)}</strong></td>
      <td>${formatYen(hourly)}</td>
      <td>${formatMin(d.shiftMin)}</td>
    </tr>`;
  }
  html += '</tbody></table></div>';
  listDiv.innerHTML = html;
  cardDiv.innerHTML = '';
  panel.style.display = 'block';
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function renderDayDetail(dateStr) {
  const drive = allDrives.find(d => d.date === dateStr);
  const cardDiv = document.getElementById('dowDayCard');
  if (!drive) {
    cardDiv.innerHTML = '<p class="muted" style="font-size:11px;">データが見つかりません</p>';
    return;
  }

  const sales = calcDailySales(drive);
  const valid = (drive.trips || []).filter(t => !t.isCancel);
  const km = valid.reduce((s, t) => s + (t.km || 0), 0);
  const bd = calcTimeBreakdown(drive);
  const summary = isSummaryOnly(drive);
  const hourly = bd.totalMin > 0 ? sales.inclTax / (bd.totalMin / 60) : 0;
  const dow = dowOf(dateStr);
  const dowColor = dow === 0 ? '#d32f2f' : dow === 6 ? '#1976d2' : '';

  // ゾーン別
  const defaultDep = config?.defaults?.departureTime || '07:00';
  const zones = getShiftZones(defaultDep);
  const pb = !summary ? calcZoneBreakdown(drive, zones) : null;

  // 緑系濃淡 (売上)
  function inclBg(v, max) {
    if (!v || v <= 0 || !max) return '';
    const r = Math.min(1, v / max);
    const alpha = 0.05 + r * 0.45;
    return `background:rgba(76,175,80,${alpha.toFixed(2)});`;
  }
  // オレンジ系 (時間単価)
  function hourlyBg(v, max) {
    if (!v || v <= 0 || !max) return '';
    const r = Math.min(1, v / max);
    const alpha = 0.05 + r * 0.45;
    return `background:rgba(255,152,0,${alpha.toFixed(2)});`;
  }

  // 今月度のmaxを計算（同じ月のドライブから）
  const ym = dateStr.slice(0, 7);
  const monthDrives = allDrives.filter(d => d.date.startsWith(ym) && !isSummaryOnly(d));
  const maxIncl = Math.max(...monthDrives.map(d => calcDailySales(d).inclTax), 1);
  const maxHourly = Math.max(...monthDrives.map(d => {
    const b = calcTimeBreakdown(d);
    return b.totalMin > 0 ? calcDailySales(d).inclTax / (b.totalMin / 60) : 0;
  }), 1);

  const dash = '<span style="color:var(--muted);">—</span>';

  // ゾーン別セル
  let zoneCells = '';
  if (pb) {
    for (const z of zones) {
      const v = pb[z.key].sales;
      zoneCells += `<div style="flex:1;text-align:center;padding:6px 2px;border-radius:4px;background:#fafafa;">
        <div style="font-size:9px;color:var(--muted);">${z.label}</div>
        <div style="font-size:12px;font-weight:600;">${v > 0 ? formatYen(v) : dash}</div>
      </div>`;
    }
  }

  // メモ
  const memoHtml = (drive.reviewMemo || '').trim()
    ? `<div style="margin-top:8px;padding:8px;background:#fff8e1;border-radius:4px;font-size:12px;white-space:pre-wrap;">${drive.reviewMemo.replace(/</g,'&lt;')}</div>`
    : '';

  cardDiv.innerHTML = `
    <div style="border:1px solid #e0e0e0;border-radius:6px;padding:12px;margin-top:8px;background:#fff;">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;">
        <div>
          <strong style="font-size:15px;color:${dowColor || '#333'};">${formatDateY(dateStr)} (${DOW_LABELS[dow]})</strong>
          ${summary ? '<span class="badge" style="font-size:9px;padding:0 4px;background:#ddd;color:#666;margin-left:4px;">概</span>' : ''}
        </div>
        <a href="detail.html?date=${dateStr}" style="font-size:11px;color:var(--primary);text-decoration:none;font-weight:600;">詳細 ›</a>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px;">
        <div style="padding:8px;border-radius:4px;${inclBg(sales.inclTax, maxIncl)}">
          <div style="font-size:10px;color:var(--muted);">税込売上</div>
          <div style="font-size:16px;font-weight:600;">${formatYen(sales.inclTax)}</div>
        </div>
        <div style="padding:8px;border-radius:4px;background:#fafafa;">
          <div style="font-size:10px;color:var(--muted);">税抜売上</div>
          <div style="font-size:14px;font-weight:600;">${formatYen(sales.exclTax)}</div>
        </div>
      </div>
      ${pb ? `<div style="display:flex;gap:4px;margin-top:8px;">${zoneCells}</div>` : ''}
      <div style="display:grid;grid-template-columns:repeat(3, 1fr);gap:8px;margin-top:8px;font-size:11px;">
        <div style="text-align:center;padding:6px;background:#fafafa;border-radius:4px;">
          <div style="color:var(--muted);font-size:10px;">件数</div>
          <div style="font-weight:600;">${summary ? dash : valid.length}</div>
        </div>
        <div style="text-align:center;padding:6px;background:#fafafa;border-radius:4px;">
          <div style="color:var(--muted);font-size:10px;">実車km</div>
          <div style="font-weight:600;">${summary ? dash : km.toFixed(1)}</div>
        </div>
        <div style="text-align:center;padding:6px;border-radius:4px;${hourlyBg(hourly, maxHourly)}">
          <div style="color:var(--muted);font-size:10px;">時間単価</div>
          <div style="font-weight:600;">${summary ? dash : formatYen(hourly)}</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3, 1fr);gap:8px;margin-top:4px;font-size:11px;">
        <div style="text-align:center;padding:6px;background:#fafafa;border-radius:4px;">
          <div style="color:var(--muted);font-size:10px;">乗務時間</div>
          <div style="font-weight:600;">${summary ? dash : formatMin(bd.totalMin)}</div>
        </div>
        <div style="text-align:center;padding:6px;background:#fafafa;border-radius:4px;">
          <div style="color:var(--muted);font-size:10px;">実車時間</div>
          <div style="font-weight:600;">${summary ? dash : formatMin(bd.tripMin)}</div>
        </div>
        <div style="text-align:center;padding:6px;background:#fafafa;border-radius:4px;">
          <div style="color:var(--muted);font-size:10px;">休憩時間</div>
          <div style="font-weight:600;">${summary ? dash : formatMin(bd.restMin)}</div>
        </div>
      </div>
      ${memoHtml}
      <div style="margin-top:8px;font-size:10px;color:var(--muted);text-align:right;">時間帯は出庫${defaultDep}基準</div>
    </div>
  `;
  cardDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function renderTrend() {
  const svg = document.getElementById('trendSvg');
  const w = svg.clientWidth || 320, h = 130;
  const padL = 40, padR = 8, padT = 10, padB = 18;
  const innerW = w - padL - padR, innerH = h - padT - padB;
  const valueOf = (s) => ({total: s.totalPay, sales: s.totalSales, hourly: s.hourly, shifts: s.totalShifts}[selectedMetric]);
  const values = monthSummaries.map(valueOf);
  const max = Math.max(...values, 1);
  const min = 0;
  const xStep = innerW / Math.max(1, monthSummaries.length - 1);
  const points = monthSummaries.map((s, i) => {
    const x = padL + i * xStep;
    const y = padT + innerH - ((valueOf(s) - min) / (max - min)) * innerH;
    return { x, y, value: valueOf(s), summary: s };
  });
  const linePath = points.map((p, i) => (i === 0 ? 'M' : 'L') + p.x + ',' + p.y).join(' ');
  const yLabels = [0, 0.5, 1].map(r => {
    const y = padT + innerH - r * innerH;
    const v = min + (max - min) * r;
    return `<line class="trend-axis" x1="${padL}" y1="${y}" x2="${w - padR}" y2="${y}"/>
      <text class="trend-label" x="${padL - 4}" y="${y + 3}" text-anchor="end">${formatLabelValue(v)}</text>`;
  }).join('');
  const xLabels = points.map((p,i) => {
    const ym = p.summary.ym;
    const showYear = (i === 0) || (i > 0 && ym.slice(0,4) !== monthSummaries[i-1].ym.slice(0,4));
    const txt = showYear ? ym.slice(2,4)+"'"+ym.slice(5)+'月' : ym.slice(5)+'月';
    return `<text class="trend-month" x="${p.x}" y="${h - 4}" text-anchor="middle">${txt}</text>`;
  }).join('');
  const dots = points.map((p,i) => `<circle class="trend-dot" cx="${p.x}" cy="${p.y}" r="6" data-i="${i}" style="cursor:pointer;"/>`).join('');
  svg.innerHTML = `${yLabels}<path class="trend-line" d="${linePath}"/>${dots}${xLabels}`;
  // dotクリック
  svg.querySelectorAll('.trend-dot').forEach(el => {
    el.addEventListener('click', (e) => {
      const i = parseInt(el.dataset.i);
      const s = monthSummaries[i];
      const prev = i > 0 ? monthSummaries[i-1] : null;
      const v = valueOf(s);
      let diff = '';
      if (prev) {
        const pv = valueOf(prev);
        const d = v - pv;
        const pct = pv > 0 ? (d / pv * 100) : 0;
        const sign = d >= 0 ? '+' : '';
        diff = ` (前月比 <strong style="color:${d>=0?'var(--primary)':'var(--orange,#ff9800)'};">${sign}${formatLabelValue(d)} ${sign}${pct.toFixed(1)}%</strong>)`;
      }
      const tip = document.getElementById('trendTip');
      tip.classList.add('show');
      tip.innerHTML = `<strong>${formatBillingPeriod(s.ym)}</strong>: ${formatLabelValue(v)}${diff}<br>
        <span class="muted" style="font-size:11px;">乗務${s.totalShifts} / 売上${formatYen(s.totalSales)} / 時間単価${formatYen(s.hourly)}</span>`;
    });
  });
  const last = monthSummaries[monthSummaries.length - 1];
  const prev = monthSummaries[monthSummaries.length - 2];
  if (prev) {
    const lv = valueOf(last), pv = valueOf(prev);
    const diff = lv - pv;
    const pct = pv > 0 ? (diff / pv * 100) : 0;
    const sign = diff >= 0 ? '+' : '';
    document.getElementById('trendLegend').innerHTML =
      `直近月: <strong>${formatLabelValue(lv)}</strong> (前月比 <span style="color:${diff>=0?'var(--primary)':'var(--orange,#ff9800)'};">${sign}${formatLabelValue(diff)} ${sign}${pct.toFixed(1)}%</span>)`;
  } else {
    document.getElementById('trendLegend').textContent = '';
  }
  document.getElementById('trendTip').classList.remove('show');
}

function formatLabelValue(v) {
  if (selectedMetric === 'shifts') return Math.round(v) + '乗務';
  if (selectedMetric === 'hourly') return formatYen(v);
  if (v >= 100000) return '¥' + (Math.round(v/1000)/10) + '万';
  return formatYen(v);
}

function renderHeatmap() {
  const preset = heatZonePreset === 'shift' && config?.defaults?.departureTime
    ? { label: 'シフト別', zones: getShiftZones(config.defaults.departureTime) }
    : ZONE_PRESETS[heatZonePreset];
  const { matrix, days } = dowZoneEfficiency(allDrives, preset.zones);
  const keys = preset.zones.map(z => z.key);
  const flat = matrix.flatMap(r => keys.map(k => r[k])).filter(v => v > 0);
  const max = Math.max(...flat, 1);
  const colCount = preset.zones.length;
  let cellsHtml = '<div class="h"></div>';
  for (const z of preset.zones) cellsHtml += `<div class="h">${z.label}<br><span style="font-size:8px;color:var(--muted);font-weight:400;">${formatZoneRange(z)}</span></div>`;
  for (let dow = 0; dow < 7; dow++) {
    const dowColor = dow === 0 ? '#d32f2f' : dow === 6 ? '#1976d2' : '';
    cellsHtml += `<div class="lbl" style="${dowColor ? 'color:' + dowColor : ''}">${DOW_LABELS[dow]}</div>`;
    for (const z of preset.zones) {
      const v = matrix[dow][z.key];
      const intensity = v > 0 ? Math.min(1, v / max) : 0;
      const bg = v > 0 ? `rgba(76, 175, 80, ${0.15 + 0.7 * intensity})` : '#fafafa';
      const text = v > 0 ? formatYen(v).replace('¥','') : '—';
      const color = intensity > 0.6 ? '#fff' : '#222';
      cellsHtml += `<div class="cell heat-touch" data-dow="${dow}" data-k="${z.key}" data-v="${v}" data-days="${days[dow]}" style="background:${bg};color:${color};">${text}</div>`;
    }
  }
  const presetTabs = Object.entries(ZONE_PRESETS).map(([key, p]) => {
    const active = key === heatZonePreset;
    const style = active ? 'background:var(--primary);color:#fff;font-weight:600;' : 'background:#f0f0f0;color:#333;';
    return `<button data-preset="${key}" class="heat-preset" style="${style}border:none;padding:4px 8px;border-radius:4px;font-size:11px;cursor:pointer;">${p.label}</button>`;
  }).join('');
  document.getElementById('heatBody').innerHTML = `
    <div style="display:flex;gap:3px;flex-wrap:wrap;margin-bottom:8px;">${presetTabs}</div>
    <div style="overflow-x:auto;">
      <div class="heat" style="grid-template-columns: 30px repeat(${colCount}, 1fr);">${cellsHtml}</div>
    </div>
  `;
  document.getElementById('heatTip').classList.remove('show');
  document.querySelectorAll('#heatBody .heat-preset').forEach(b => {
    b.onclick = () => { heatZonePreset = b.dataset.preset; renderHeatmap(); };
  });
  document.querySelectorAll('#heatBody .cell').forEach(el => {
    el.addEventListener('click', () => {
      const dow = parseInt(el.dataset.dow);
      const k = el.dataset.k;
      const v = parseFloat(el.dataset.v);
      const days = parseInt(el.dataset.days);
      const zone = preset.zones.find(z => z.key === k);
      const tip = document.getElementById('heatTip');
      tip.classList.add('show');
      if (v > 0) {
        tip.innerHTML = `<strong>${DOW_LABELS[dow]}曜 × ${zone.label}</strong><br>
          平均時間単価: <strong>${formatYen(v)}/h</strong> (${days}日ベース)`;
      } else {
        tip.innerHTML = `<strong>${DOW_LABELS[dow]}曜 × ${zone.label}</strong>: データなし`;
      }
    });
  });
}

function renderWeather() {
  const agg = weatherSalesAggregation(allDrives);
  const max = Math.max(...Object.values(agg).map(a => a.avg), 1);
  let html = '';
  for (const k of ['sunny','cloudy','rainy','snowy']) {
    const a = agg[k];
    if (a.days === 0) continue;
    const pct = (a.avg / max) * 100;
    html += `<div class="wbar ${k}" data-k="${k}" style="cursor:pointer;">
      <div class="lbl">${WEATHER_LABELS[k]}</div>
      <div><div class="bar" style="width:${pct}%"></div></div>
      <div class="v">${formatYen(a.avg)}<br><span style="font-size:9px;color:var(--muted);font-weight:400;">${a.days}日</span></div>
    </div>`;
  }
  document.getElementById('weatherBody').innerHTML = html || '<p class="muted" style="font-size:11px;">データ不足</p>';
  document.getElementById('weatherTip').classList.remove('show');
  document.querySelectorAll('#weatherBody .wbar').forEach(el => {
    el.addEventListener('click', () => {
      const k = el.dataset.k;
      const a = agg[k];
      // 晴れ基準との差分
      const baseAvg = agg.sunny?.days > 0 ? agg.sunny.avg : a.avg;
      const diff = a.avg - baseAvg;
      const pct = baseAvg > 0 ? (diff / baseAvg * 100) : 0;
      const sign = diff >= 0 ? '+' : '';
      const tip = document.getElementById('weatherTip');
      tip.classList.add('show');
      tip.innerHTML = `<strong>${WEATHER_LABELS[k]}</strong>: ${a.days}日 / 平均 <strong>${formatYen(a.avg)}</strong> / 合計 ${formatYen(a.total)}
        ${k !== 'sunny' && agg.sunny?.days > 0 ? `<br>晴れ基準: <strong style="color:${diff>=0?'var(--primary)':'var(--orange,#ff9800)'};">${sign}${formatYen(diff)} (${sign}${pct.toFixed(1)}%)</strong>` : ''}`;
    });
  });
}

function renderRanks() {
  const { best, worst } = rankDrivesBySales(allDrives, 10);
  document.getElementById('bestBody').innerHTML = renderRankTable(best, 'gold');
  document.getElementById('worstBody').innerHTML = renderRankTable(worst, 'red');
}

function renderRankTable(rows, cls) {
  if (rows.length === 0) return '<p class="muted" style="font-size:11px;">データなし</p>';
  const wIcon = (w) => {
    if (!w) return '';
    const noon = w.noon || w.morning;
    if (!noon) return '';
    const c = noon.code;
    if (c >= 71 && c <= 77) return '❄';
    if (c >= 51 && c <= 67 || c >= 80) return '☂';
    if (c >= 2) return '☁';
    return '☀';
  };
  return `<div style="overflow-x:auto;"><table class="rank-table">
    <thead><tr><th>#</th><th class="l">日付</th><th>天気</th><th>件数</th><th>売上</th></tr></thead>
    <tbody>${rows.map((r, i) => `
      <tr class="${i < 3 ? cls : ''}" onclick="location.href='detail.html?date=${r.date}'">
        <td class="rank">${i + 1}</td>
        <td class="l">${formatDateY(r.date)}</td>
        <td>${wIcon(r.weather)}</td>
        <td>${r.count}</td>
        <td><strong>${formatYen(r.sales)}</strong></td>
      </tr>`).join('')}</tbody>
  </table></div>`;
}

function renderMemos() {
  const memos = allDrives
    .filter(d => d.reviewMemo && d.reviewMemo.trim())
    .sort((a,b) => b.date.localeCompare(a.date));
  if (memos.length === 0) {
    document.getElementById('memoBody').innerHTML = '<p class="muted" style="font-size:11px;">振り返りメモはまだありません。詳細ページで記入できます。</p>';
    return;
  }
  document.getElementById('memoBody').innerHTML = memos.map(d => `
    <div onclick="location.href='detail.html?date=${d.date}'" style="padding:8px 4px;border-bottom:1px solid #eee;cursor:pointer;">
      <div style="font-size:11px;color:var(--muted);">${formatDateY(d.date)}</div>
      <div style="font-size:12px;margin-top:2px;white-space:pre-wrap;">${d.reviewMemo}</div>
    </div>
  `).join('');
}

// module内関数をHTML onclickから呼べるように公開
window.showDowDates = showDowDates;
window.renderDayDetail = renderDayDetail;

load();
