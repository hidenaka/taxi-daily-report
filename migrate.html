<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>データ移行 — GitHub → Firebase</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<main style="padding:14px;">
  <h1>データ移行ツール</h1>
  <p class="muted" style="font-size:12px;">GitHub上のデータをFirebase Firestoreにコピーします。既存データは上書きされます。</p>

  <section class="card">
    <h3>① GitHub Token 設定</h3>
    <p class="muted" style="font-size:12px;margin-top:4px;">GitHub API 読み取り用の Personal Access Token（classic）を入力してください。<br>repo スコープが必要です。</p>
    <div style="display:flex;gap:8px;margin-top:8px;">
      <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxx" style="flex:1;padding:8px;border:1px solid #ddd;border-radius:4px;">
      <button class="btn" id="saveToken">保存</button>
    </div>
    <div id="tokenStatus" style="margin-top:6px;font-size:12px;"></div>
  </section>

  <section class="card">
    <h3>② 移行対象日付（任意）</h3>
    <p class="muted" style="font-size:12px;margin-top:4px;">空白の場合は全データ移行。日付を指定した場合はその日のみ移行します。</p>
    <input type="date" id="migrateDateInput" value="2026-05-05" style="padding:8px;border:1px solid #ddd;border-radius:4px;width:100%;margin-top:8px;">
  </section>

  <section class="card">
    <h3>③ 移行対象ユーザー</h3>
    <div style="display:flex;gap:8px;margin-top:8px;">
      <button class="btn" id="migrateSelf" style="flex:1;" disabled>user_self を移行</button>
      <button class="btn" id="migrateMm" style="flex:1;" disabled>mm を移行</button>
      <button class="btn" id="migrateAll" style="flex:1;background:var(--primary);" disabled>両方 移行</button>
    </div>
  </section>

  <section class="card">
    <h3>② ログ</h3>
    <div id="log" style="font-family:monospace;font-size:11px;white-space:pre-wrap;max-height:400px;overflow-y:auto;background:#f5f5f5;padding:8px;border-radius:4px;"></div>
  </section>
</main>

<script type="module">
import { initAuth } from './js/firebase-auth.js';
import { db } from './js/firebase-init.js';
import { doc, setDoc, writeBatch, getFirestore } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

const REPO = localStorage.getItem('github_data_repo') || 'hidenaka/taxi-daily-report-data';
const logEl = document.getElementById('log');
const log = (msg) => { logEl.textContent += msg + '\n'; logEl.scrollTop = logEl.scrollHeight; };

// Token management
const tokenInput = document.getElementById('tokenInput');
const tokenStatus = document.getElementById('tokenStatus');
const btnSelf = document.getElementById('migrateSelf');
const btnMm = document.getElementById('migrateMm');
const btnAll = document.getElementById('migrateAll');

function updateTokenUI() {
  const token = localStorage.getItem('github_token');
  if (token) {
    tokenInput.value = '••••••••••••••••••••';
    tokenStatus.textContent = '✓ GitHub Token 設定済み';
    tokenStatus.style.color = 'green';
    btnSelf.disabled = false;
    btnMm.disabled = false;
    btnAll.disabled = false;
  } else {
    tokenInput.value = '';
    tokenStatus.textContent = '⚠ GitHub Token 未設定（入力して保存してください）';
    tokenStatus.style.color = 'orange';
    btnSelf.disabled = true;
    btnMm.disabled = true;
    btnAll.disabled = true;
  }
}

document.getElementById('saveToken').onclick = () => {
  const val = tokenInput.value.trim();
  if (!val || val.startsWith('•')) return;
  localStorage.setItem('github_token', val);
  updateTokenUI();
  log('✓ GitHub Token を保存しました');
};

updateTokenUI();

// Initialize Firebase auth
await initAuth();
log('✓ Firebase認証完了');

// GitHub API helper
async function ghGet(path) {
  const token = localStorage.getItem('github_token');
  if (!token) throw new Error('github_token が設定されていません');
  const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
    headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json' }
  });
  if (r.status === 404) return null;
  if (!r.ok) throw new Error(`GitHub API ${r.status}: ${path}`);
  const data = await r.json();
  if (data.content) {
    const decoded = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
    return JSON.parse(decoded);  
  }
  return data;
}

async function ghList(dir) {
  const token = localStorage.getItem('github_token');
  if (!token) throw new Error('github_token が設定されていません');
  const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${dir}`, {
    headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json' }
  });
  if (r.status === 404) return [];
  if (!r.ok) throw new Error(`GitHub API ${r.status}: ${dir}`);
  return await r.json();
}

// Migrate a single user
// specificDate: 'YYYY-MM-DD' or null (all data)
async function migrateUser(userId, specificDate = null) {
  log(`\n=== ${userId} の移行開始 ${specificDate ? `(${specificDate} のみ)` : '(全データ)'} ===`);

  // 1. Migrate drives
  const driveDir = `data/drives/${userId}`;
  log(`📁 ${driveDir}/ を読み込み中...`);
  const files = await ghList(driveDir);
  if (!files || files.length === 0) {
    log(`  ドライブデータなし`);
  } else {
    let targetFiles = files;
    if (specificDate) {
      targetFiles = files.filter(f => f.name === `${specificDate}.json`);
      if (targetFiles.length === 0) {
        log(`  ${specificDate}.json が見つかりません`);
      } else {
        log(`  対象ファイル: ${specificDate}.json`);
      }
    } else {
      log(`  ${files.length}ファイル発見`);
    }

    let count = 0;
    // Batch write (max 500 per batch)
    let batch = writeBatch(db);
    let batchCount = 0;

    for (const file of targetFiles) {
      if (!file.name.endsWith('.json')) continue;
      const date = file.name.replace('.json', '');
      const data = await ghGet(`${driveDir}/${file.name}`);
      if (!data) continue;

      const ref = doc(db, 'drives', userId, 'daily', date);
      batch.set(ref, data);
      batchCount++;
      count++;

      if (batchCount >= 400) {
        await batch.commit();
        log(`  ${count}/${targetFiles.length} 件コミット済み`);
        batch = writeBatch(db);
        batchCount = 0;
      }
    }

    if (batchCount > 0) {
      await batch.commit();
    }
    if (targetFiles.length > 0) {
      log(`✓ ドライブ: ${count}件 移行完了`);
    }
  }

  // 2. Migrate config (config は特定日付移行時も移行する)
  log(`📁 config/${userId}.json を読み込み中...`);
  const config = await ghGet(`data/config/${userId}.json`);
  if (config) {
    const ref = doc(db, 'configs', userId);
    await setDoc(ref, config);
    log(`✓ 設定 移行完了`);
  } else {
    log(`  設定ファイルなし`);
  }

  log(`=== ${userId} 移行完了 ===`);
}

// Button handlers
function getMigrateDate() {
  const val = document.getElementById('migrateDateInput').value;
  return val || null;
}

document.getElementById('migrateSelf').onclick = async () => {
  try { await migrateUser('user_self', getMigrateDate()); } catch (e) { log(`✗ エラー: ${e.message}`); }
};
document.getElementById('migrateMm').onclick = async () => {
  try { await migrateUser('mm', getMigrateDate()); } catch (e) { log(`✗ エラー: ${e.message}`); }
};
document.getElementById('migrateAll').onclick = async () => {
  try {
    const date = getMigrateDate();
    await migrateUser('user_self', date);
    await migrateUser('mm', date);
    log('\n🎉 すべての移行が完了しました！');
    log('次のステップ: storage.js の GitHub 依存を解除して Firebase のみにする');
  } catch (e) { log(`✗ エラー: ${e.message}`); }
};

log('✓ 準備完了。「user_self を移行」「mm を移行」または「両方 移行」をクリックしてください。');
</script>
</body>
</html>
