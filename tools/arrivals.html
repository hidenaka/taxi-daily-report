<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cabis ｜ 到着便</title>
  <link rel="icon" type="image/png" sizes="180x180" href="./icon-180.png">
  <link rel="manifest" href="../manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <style>
    :root { --bg: #0e0e10; --fg: #e8e8e8; --sub: #888; --accent: #4ea1ff; --peak: #ff5252; --warn: #ffb84d; --intl: #b07aff; --taxi: #6ec96e; }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--fg); font-family: -apple-system, system-ui, sans-serif; font-size: 15px; }
    .app-tabs {
      display: flex; position: sticky; top: 0; z-index: 10;
      background: #0a0a0f; border-bottom: 1px solid #222;
    }
    .app-tab {
      flex: 1; padding: 14px 8px; text-align: center; text-decoration: none;
      color: var(--sub); font-size: 15px; font-weight: 600; letter-spacing: 0.3px;
      border-bottom: 3px solid transparent;
      -webkit-tap-highlight-color: transparent;
    }
    .app-tab.active {
      color: var(--fg); border-bottom-color: var(--accent);
      background: rgba(78, 161, 255, 0.08);
    }
    .app-tab:active { background: rgba(255,255,255,0.05); }
    .terminal-tabs { display: flex; gap: 6px; padding: 8px 12px; border-bottom: 1px solid #222; flex-wrap: wrap; }
    .terminal-tab { background: #1a1a1d; color: var(--sub); padding: 6px 10px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; }
    .terminal-tab.is-active { background: var(--accent); color: #000; }
    section { padding: 8px 12px; }
    h2 { font-size: 13px; color: var(--sub); margin: 8px 0; font-weight: normal; }
    #legend { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; padding: 6px 12px; background: #14141a; border-bottom: 1px solid #222; font-size: 11px; color: var(--sub); }
    .legend-item { display: inline-flex; align-items: center; gap: 4px; }
    .legend-swatch { display: inline-block; width: 12px; height: 8px; border-radius: 2px; }
    .legend-low  .legend-swatch { background: var(--accent); }
    .legend-mid  .legend-swatch { background: var(--warn); }
    .legend-high .legend-swatch { background: var(--peak); }
    .legend-intl .legend-swatch { background: var(--intl); }
    #heatmap .heatmap-row { display: grid; grid-template-columns: 44px 1fr 200px; align-items: center; gap: 8px; padding: 4px 0; }
    .heatmap-time { color: var(--sub); font-variant-numeric: tabular-nums; font-size: 13px; }
    .heatmap-bar-wrap { position: relative; height: 10px; background: rgba(255,255,255,0.04); border-radius: 2px; }
    .heatmap-bar { position: relative; background: var(--accent); height: 100%; border-radius: 2px; min-width: 2px; display: block; }
    .heatmap-bar-intl { position: absolute; right: 0; top: 0; bottom: 0; background: var(--intl); border-radius: 0 2px 2px 0; }
    .heatmap-row.tier-high .heatmap-bar { background: var(--peak); }
    .heatmap-row.tier-mid .heatmap-bar { background: var(--warn); }
    .heatmap-row.tier-low .heatmap-bar { background: var(--accent); }
    .heatmap-label { color: var(--fg); font-size: 12px; text-align: right; line-height: 1.5; }
    .tier-badge { font-size: 11px; padding: 1px 5px; border-radius: 3px; background: rgba(255,255,255,0.06); white-space: nowrap; }
    .tier-high .tier-badge { color: var(--peak); }
    .tier-mid  .tier-badge { color: var(--warn); }
    .tier-low  .tier-badge { color: var(--sub); }
    .delay-badge { color: var(--warn); font-size: 11px; white-space: nowrap; }
    .intl-badge { color: var(--intl); font-size: 11px; white-space: nowrap; }
    .unknown-note { color: var(--sub); font-size: 11px; }
    #summary { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; padding: 10px 12px; background: #16161a; border-bottom: 1px solid #222; font-size: 13px; }
    #summary .summary-item strong { color: var(--accent); font-size: 16px; font-variant-numeric: tabular-nums; }
    #summary .summary-delay { color: var(--warn); font-weight: 600; }
    #summary .summary-ok { color: #6ec96e; font-size: 12px; }
    #summary .summary-intl { color: var(--intl); font-size: 12px; }
    #summary .summary-reach-none { color: var(--peak); font-size: 12px; font-weight: 600; }
    #topics { background: #181820; border-top: 1px solid #2a2a35; border-bottom: 1px solid #2a2a35; padding: 8px 12px; }
    #topics .topic-header { color: var(--peak); font-weight: 700; font-size: 13px; margin-bottom: 4px; }
    #topics .topic-item { display: grid; grid-template-columns: 60px 1fr auto 26px; gap: 6px; align-items: baseline; padding: 3px 0; font-size: 12px; }
    #topics .topic-flight { color: var(--accent); font-weight: 600; }
    #topics .topic-from { color: var(--fg); }
    #topics .topic-detail { color: var(--fg); font-size: 11px; text-align: right; opacity: 0.85; }
    #topics .topic-terminal { color: var(--sub); font-size: 11px; }
    #detail-toggle { display: block; margin: 8px auto; padding: 6px 14px; background: #1a1a1d; color: var(--sub); border: 1px solid #333; border-radius: 6px; cursor: pointer; font-size: 12px; }
    #detail-toggle.is-active { background: var(--accent); color: #000; border-color: var(--accent); }
    #flight-list-section { padding: 0 12px 8px; }
    #flight-list-section .section-head { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    #flight-list-section .section-head h2 { margin: 8px 0; }
    .origin-filter { padding: 4px 8px; background: #16161c; color: var(--fg); border: 1px solid #333; border-radius: 6px; font-size: 13px; max-width: 200px; }
    #flight-list { display: flex; flex-direction: column; }
    #flight-list .flight-row { padding: 10px 8px; border-bottom: 1px solid #1a1a1d; }
    #flight-list .flight-row:last-child { border-bottom: none; }
    #flight-list .empty { color: var(--sub); font-size: 12px; padding: 12px 0; text-align: center; }
    .flight-line1 { display: flex; gap: 8px; align-items: baseline; }
    .flight-line1 .time { font-weight: bold; min-width: 50px; font-variant-numeric: tabular-nums; }
    .flight-line1 .flight-no { min-width: 64px; font-weight: 700; }
    .flight-line1 .from { flex: 1; }
    .flight-line1 .reach { font-size: 13px; margin-left: auto; }
    .delay-boost { color: var(--peak); font-size: 11px; padding: 1px 4px; border-radius: 3px; background: rgba(255,82,82,0.15); margin-left: 4px; }
    .lightning-boost { color: #ffd84d; font-size: 11px; padding: 1px 4px; border-radius: 3px; background: rgba(255,216,77,0.15); margin-left: 4px; font-weight: 600; }
    #weather-banner { padding: 10px 12px; font-size: 13px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #2a2a35; }
    #weather-banner.is-active { background: linear-gradient(90deg, #4a2010, #5a2818); color: #ffd5b0; border-color: #6b3520; }
    #weather-banner.is-recovery { background: linear-gradient(90deg, #2a3a18, #3a4d20); color: #fff3a0; border-color: #5a6e2a; }
    #weather-banner .weather-icon { font-size: 18px; }
    #weather-banner strong { color: #fff; font-weight: 700; }
    .flight-line2 { padding-left: 58px; margin-top: 4px; font-size: 13px; }
    .flight-line2 .pax-est { font-weight: 600; }
    .flight-line2 .pax-max { color: var(--sub); }
    .flight-line3 { padding-left: 58px; margin-top: 3px; color: var(--sub); font-size: 12px; }
    .flight-row.is-delayed { background: rgba(255, 184, 77, 0.08); }
    .flight-row.is-delayed .status { color: var(--warn); }
    .flight-row.is-unknown { opacity: 0.6; }
    /* 航空会社色: 便名 (.flight-no) の文字色に反映。hex は tools/js/airline-color.js と同期 */
    .flight-row .flight-no                 { color: var(--accent); }
    .flight-row.airline-jal   .flight-no   { color: #e60012; }
    .flight-row.airline-ana   .flight-no   { color: #4a8cff; }
    .flight-row.airline-jjp   .flight-no   { color: #ff5e1f; }
    .flight-row.airline-sky   .flight-no   { color: #00b6f0; }
    .flight-row.airline-ado   .flight-no   { color: #4ea83a; }
    .flight-row.airline-sna   .flight-no   { color: #f4cd00; }
    .flight-row.airline-sfj   .flight-no   { color: #aaaaaa; }
    .flight-row.airline-other .flight-no   { color: #888888; }
    /* ターミナル文字タグ: T1=赤・T2=青・T3=灰でターミナルを一目識別 */
    .terminal-tag { display: inline-block; padding: 1px 6px; border-radius: 3px;
      background: rgba(255,255,255,0.08); color: var(--sub); font-size: 11px;
      font-weight: 700; margin-left: 6px; letter-spacing: 0.5px; }
    .terminal-tag.t1 { background: #e60012; color: #fff; }
    .terminal-tag.t2 { background: #1656c8; color: #fff; }
    .terminal-tag.t3 { background: #4a4a4a; color: #fff; }
    footer { padding: 8px 12px; color: var(--sub); font-size: 11px; border-top: 1px solid #222; display: flex; flex-direction: column; gap: 2px; }
    footer.is-stale .updated { color: var(--warn); }
    .empty { color: var(--sub); padding: 12px 0; text-align: center; }
    #arrivals-error { background: #4a1a1a; color: #ffb; padding: 8px; border-radius: 4px; margin: 8px 12px; }
    #forecast-section { border-bottom: 1px solid #222; }
    #forecast-section h2 { font-size: 15px; color: var(--fg); margin: 14px 0 6px; font-weight: 600; }
    #forecast-section .fc-controls { display: flex; gap: 8px; align-items: center; margin: 4px 0 8px; flex-wrap: wrap; }
    #forecast-section .fc-mode { padding: 4px 8px; background: #16161c; color: var(--fg); border: 1px solid #333; border-radius: 6px; font-size: 13px; }
    #forecast-section .fc-scope-group { display: inline-flex; border: 1px solid #333; border-radius: 6px; overflow: hidden; }
    #forecast-section .fc-scope-btn { padding: 4px 10px; background: #1a1a1d; color: var(--sub); border: none; font-size: 12px; cursor: pointer; }
    #forecast-section .fc-scope-btn + .fc-scope-btn { border-left: 1px solid #333; }
    #forecast-section .fc-scope-btn.is-active { background: var(--accent); color: #000; font-weight: 600; }
    #forecast-section .fc-scope { margin: 0 0 6px; color: var(--sub); font-size: 11px; }
    .fc-meta { color: var(--sub); font-size: 12px; margin-bottom: 8px; }
    .fc-empty { color: var(--sub); font-size: 13px; }
    .fc-table { border-collapse: collapse; width: 100%; }
    .fc-table th, .fc-table td { padding: 7px 8px; border-bottom: 1px solid #222; text-align: right; font-variant-numeric: tabular-nums; }
    .fc-table th { background: #16161c; color: var(--sub); font-weight: 500; font-size: 12px; }
    .fc-table th:first-child, .fc-table td.fc-time { text-align: left; }
    .fc-table td.fc-time { font-weight: 600; }
    .fc-table td.fc-total { font-weight: 700; color: var(--accent); }

    body { padding-bottom: 64px; }
    nav.bottom {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 56px; background: #16161c;
      border-top: 1px solid #222;
      display: flex;
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 50;
    }
    nav.bottom a {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-decoration: none; color: var(--sub);
      font-size: 11px;
    }
    nav.bottom a.active { color: var(--accent); }
  </style>
<style>body{visibility:hidden;pointer-events:none;}</style>
</head>
<body>
  <script type="module">
    import { enforceAccess } from '../js/access-control.js';
    if (!(await enforceAccess('core', { redirect: '../subscribe.html' }))) {
      throw new Error('access-denied: redirected');
    }
  </script>
  <nav class="app-tabs" role="tablist" aria-label="アプリ切替">
    <a href="./" class="app-tab">⏱ 乗務タイマー</a>
    <a href="ic.html" class="app-tab">🛣 IC判定</a>
    <a href="arrivals.html" class="app-tab active" aria-current="page">✈ 到着便</a>
  </nav>

  <div class="terminal-tabs">
    <button class="terminal-tab" data-terminal="T1">T1</button>
    <button class="terminal-tab" data-terminal="T2">T2</button>
    <button class="terminal-tab is-active" data-terminal="T1T2">T1+T2 合計</button>
    <button class="terminal-tab" data-terminal="T3">T3 (国際)</button>
    <button id="arrivals-reload" style="margin-left:auto; background:transparent; color:var(--sub); border:none; cursor:pointer;">↻</button>
  </div>

  <div id="arrivals-error" hidden></div>

  <div id="weather-banner" hidden></div>

  <section id="forecast-section">
    <h2>🚕 タクシー出庫（実績／予測）</h2>
    <p class="fc-scope">※台数は第1〜第4乗り場（東京車両ポール）の合計です</p>
    <div class="fc-controls">
      <select id="forecast-mode" class="fc-mode">
        <option value="actuals">実績</option>
        <option value="forecast">予測</option>
      </select>
      <div class="fc-scope-group" role="group" aria-label="表示範囲">
        <button id="forecast-scope-recent" type="button" class="fc-scope-btn">直近2時間</button>
        <button id="forecast-scope-all" type="button" class="fc-scope-btn">今日全部</button>
      </div>
    </div>
    <div id="forecast-meta" class="fc-meta">読み込み中...</div>
    <div id="forecast-table-wrap"></div>
  </section>

  <div id="topics" hidden></div>

  <div id="legend"></div>

  <div id="summary"></div>

  <button id="detail-toggle" type="button">▼ 今日の全便を表示</button>

  <section>
    <h2>時間帯別 推定降客数（30分単位）</h2>
    <div id="heatmap"></div>
  </section>

  <section id="flight-list-section">
    <div class="section-head">
      <h2>✈ 便リスト（時刻順）</h2>
      <select id="origin-filter" class="origin-filter" aria-label="出発地で絞り込み">
        <option value="">すべて</option>
      </select>
    </div>
    <div id="flight-list"></div>
  </section>

  <footer id="arrivals-footer"></footer>

  <script type="module" src="./js/arrivals-app.js?v=20260507b"></script>
  <div id="navHost"></div>
  <script type="module">
    import { renderBottomNav } from '../js/app.js';
    import { showGpsPrivacyBanner } from '../js/gps-privacy-banner.js';
    document.getElementById('navHost').innerHTML = renderBottomNav('tools', '../');
    showGpsPrivacyBanner();
  </script>
</body>
</html>
