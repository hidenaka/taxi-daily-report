<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>詳細 — タクシー日報</title>
<link rel="stylesheet" href="css/style.css">
<style>
.kpi-row { display: flex; gap: 8px; }
.kpi-row > div { flex: 1; text-align: center; }
.kpi-row .num { font-size: 18px; font-weight: 700; }
.kpi-row .lbl { font-size: 10px; color: var(--muted); }

.alloc-bar { display: flex; height: 22px; border-radius: 4px; overflow: hidden; margin-top: 6px; }
.alloc-bar > div { display: flex; align-items: center; justify-content: center; color: #fff; font-size: 11px; }
.alloc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 8px; font-size: 11px; }
.alloc-grid > div { background: #f5f5f5; padding: 6px; border-radius: 4px; text-align: center; }
.alloc-grid .lbl { color: var(--muted); font-size: 10px; }
.alloc-grid .v { font-weight: 600; font-size: 13px; }

.period-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 4px; }
.period-table th, .period-table td { padding: 4px 3px; text-align: right; border-bottom: 1px solid #eee; }
.period-table th { font-weight: 600; color: var(--muted); font-size: 10px; }
.period-table th.lbl, .period-table td.lbl { text-align: left; color: var(--muted); }
.period-table tr.total { background: #f5f5f5; font-weight: 600; }
.period-table tr.total td { border-top: 2px solid #ddd; }

.hour-list { margin-top: 8px; }
.hour-row { display: grid; grid-template-columns: 38px 1fr 70px; gap: 6px; align-items: center; padding: 4px 0; border-bottom: 1px solid #f0f0f0; font-size: 12px; }
.hour-row .h { font-weight: 600; color: #444; text-align: right; padding-right: 4px; font-size: 12px; }
.hour-row .h.zero { color: #ccc; font-weight: 400; }
.hour-row .barcell { display: grid; grid-template-rows: 1fr 1fr; gap: 2px; }
.hour-row .bar-bg { height: 11px; background: #f5f5f5; border-radius: 3px; overflow: hidden; }
.hour-row .bar { height: 100%; border-radius: 3px; min-width: 0; transition: width 0.2s; }
.hour-row .bar.sales { background: var(--green, #4CAF50); }
.hour-row .bar.rest { background: #757575; }
.hour-row .vals { font-size: 10px; line-height: 1.3; text-align: right; color: var(--muted); }
.hour-row .vals .y { color: #1b5e20; font-weight: 600; font-size: 11px; }
.hour-row .vals .r { color: #555; }

.trip-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 4px; }
.trip-table th, .trip-table td { padding: 4px 3px; border-bottom: 1px solid #eee; }
.trip-table th { font-weight: 600; color: var(--muted); font-size: 10px; text-align: left; }
.trip-table td.r, .trip-table th.r { text-align: right; }
.trip-table .place { max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.trip-table tr.cancel { color: var(--orange); }
.trip-table tr.charter { background: #fff3e0; }
.legend { font-size: 10px; color: var(--muted); margin-top: 4px; }
</style>
</head>
<body>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
}
</script>
<main style="padding:14px;">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
    <button class="btn" onclick="history.length > 1 ? history.back() : location.href='index.html'" style="background:var(--gray);padding:6px 12px;font-size:13px;">← 戻る</button>
    <a href="index.html" style="font-size:12px;color:var(--muted);text-decoration:none;">ホーム</a>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:4px;">
    <h1 id="title" style="margin-top:0;flex:1;">乗務詳細</h1>
    <button class="btn" id="editBtnTop" style="background:var(--primary);color:#fff;font-size:12px;padding:6px 12px;white-space:nowrap;">編集</button>
  </div>
  <div id="navDates" style="display:flex;justify-content:space-between;gap:8px;margin-bottom:10px;"></div>

  <section class="card" id="kpiCard"></section>
  <section class="card" id="periodCard"></section>
  <section class="card" id="allocCard"></section>
  <section class="card" id="hourCard"></section>
  <section class="card" id="weatherCard"></section>
  <section class="card" id="reviewMemoCard"></section>
  <section class="card" id="tripsCard"></section>

  <button class="btn btn-block" id="editBtn" style="margin-top:8px;">この乗務を編集</button>
</main>
<div id="navHost"></div>
<script type="module">
import { renderBottomNav, formatYen, formatDate } from './js/app.js';
import { getDrive, listFiles, saveDriveSafe } from './js/storage.js';
import { calcDailySales } from './js/payroll.js';
import { calcTimeBreakdown, hourlyActivity, calcPeriodBreakdown, PERIOD_LABELS, formatMin, timeToMinutes } from './js/chart-helpers.js';
import { weatherEmoji } from './js/weather.js';

const SHIFT_START_HOUR = 7;
function shiftHour(h) { return h < SHIFT_START_HOUR ? h + 24 : h; }
function shiftTimeStr(t) {
  if (!t) return '';
  const [h, m] = t.split(':').map(Number);
  const sh = h < SHIFT_START_HOUR ? h + 24 : h;
  return `${String(sh).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
}
function shiftedMinutes(t) {
  if (!t) return 0;
  const [h, m] = t.split(':').map(Number);
  const sh = h < SHIFT_START_HOUR ? h + 24 : h;
  return sh * 60 + m;
}

document.getElementById('navHost').innerHTML = renderBottomNav('home');

const params = new URLSearchParams(location.search);
const date = params.get('date');

async function load() {
  const drive = await getDrive(date);
  if (!drive) { document.getElementById('title').textContent = '見つかりません'; return; }
  document.getElementById('title').textContent = `${formatDate(drive.date)} 詳細`;
  renderDateNav(date);

  const sales = calcDailySales(drive);
  const valid = (drive.trips || []).filter(t => !t.isCancel);
  const validCount = valid.length;
  const km = valid.reduce((s, t) => s + (t.km || 0), 0);
  const breakdown = calcTimeBreakdown(drive);
  const totalHours = breakdown.totalMin / 60;
  const hourlyRate = totalHours > 0 ? sales.inclTax / totalHours : 0;
  const avgPrice = validCount > 0 ? sales.inclTax / validCount : 0;

  // KPI 4列
  document.getElementById('kpiCard').innerHTML = `
    <div class="kpi-row">
      <div><div class="lbl">売上(税込)</div><div class="num">${formatYen(sales.inclTax)}</div></div>
      <div><div class="lbl">件数</div><div class="num">${validCount}</div></div>
      <div><div class="lbl">平均単価</div><div class="num">${formatYen(avgPrice)}</div></div>
      <div><div class="lbl">時間単価(乗務)</div><div class="num">${formatYen(hourlyRate)}</div></div>
    </div>
    <div class="kpi-row" style="margin-top:8px;">
      <div><div class="lbl">走行距離</div><div class="num">${km.toFixed(1)}<span style="font-size:11px;">km</span></div></div>
      <div><div class="lbl">出庫</div><div class="num" style="font-size:14px;">${drive.departureTime || '-'}</div></div>
      <div><div class="lbl">帰庫</div><div class="num" style="font-size:14px;">${drive.returnTime || '-'}</div></div>
      <div><div class="lbl">車種</div><div class="num" style="font-size:14px;">${drive.vehicleType === 'premium' ? 'プレ' : '普通'}</div></div>
    </div>
    ${drive.memo ? `<div style="margin-top:8px;font-size:11px;color:var(--muted);">メモ: ${drive.memo}</div>` : ''}
  `;

  // 時間帯別サマリー表
  renderPeriodTable(drive);

  // 時間配分3色帯 + 数値
  const total = Math.max(1, breakdown.totalMin);
  document.getElementById('allocCard').innerHTML = `
    <div class="muted">時間配分（営業時間 ${formatMin(total)}）</div>
    <div class="alloc-bar">
      <div style="background:var(--green);flex:${breakdown.tripMin}">実車 ${formatMin(breakdown.tripMin)}</div>
      <div style="background:var(--gray);flex:${breakdown.restMin}">休 ${formatMin(breakdown.restMin)}</div>
      <div style="background:var(--orange);flex:${breakdown.idleMin}">空車 ${formatMin(breakdown.idleMin)}</div>
    </div>
    <div class="alloc-grid">
      <div><div class="lbl">営業時間</div><div class="v">${formatMin(total)}</div></div>
      <div><div class="lbl">実車</div><div class="v">${formatMin(breakdown.tripMin)}</div></div>
      <div><div class="lbl">休憩</div><div class="v">${formatMin(breakdown.restMin)}</div></div>
      <div><div class="lbl">空車</div><div class="v">${formatMin(breakdown.idleMin)}</div></div>
    </div>
  `;

  // 時間別: 7時スタート、各バーに金額・実車分
  renderHourChart(drive);

  // 天候 (絵文字+温度のシンプル表記)
  if (drive.weather) {
    const w = drive.weather;
    const cell = (lbl, p) => `<div style="text-align:center;flex:1;">
      <div style="font-size:10px;color:var(--muted);">${lbl}</div>
      <div style="font-size:24px;line-height:1.2;">${p ? weatherEmoji(p.code) : '—'}</div>
      <div style="font-size:11px;color:#444;">${p?.tempAvg != null ? p.tempAvg + '℃' : ''}${p?.precipMm > 0 ? ` / ${p.precipMm}mm` : ''}</div>
    </div>`;
    document.getElementById('weatherCard').innerHTML = `
      <div class="muted">天候</div>
      <div style="display:flex;gap:4px;margin-top:6px;">
        ${cell('朝', w.morning)}
        ${cell('昼', w.noon)}
        ${cell('夕夜', w.evening)}
        ${cell('深夜', w.night)}
      </div>
    `;
  } else {
    document.getElementById('weatherCard').innerHTML = `<div class="muted">天候未取得</div>`;
  }

  // 振り返りメモ
  renderReviewMemo(drive);

  // 日報明細(完全版)
  renderTripsTable(drive);

  const goEdit = () => location.href = `input.html?date=${date}`;
  document.getElementById('editBtn').onclick = goEdit;
  document.getElementById('editBtnTop').onclick = goEdit;
}

function renderReviewMemo(drive) {
  const card = document.getElementById('reviewMemoCard');
  const memo = drive.reviewMemo || '';
  card.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:baseline;">
      <strong>振り返りメモ</strong>
      <span class="muted" style="font-size:10px;">気づき/反省/次回の改善</span>
    </div>
    <textarea id="reviewMemoInput" class="input" rows="3" style="margin-top:6px;width:100%;box-sizing:border-box;font-family:inherit;" placeholder="例: 雨で羽田が混んだ。次回は10時前に羽田入りする">${memo}</textarea>
    <div style="display:flex;gap:8px;align-items:center;margin-top:6px;">
      <button class="btn" id="saveMemoBtn" style="padding:6px 14px;font-size:13px;">保存</button>
      <span id="memoStatus" class="muted" style="font-size:11px;"></span>
    </div>
  `;
  document.getElementById('saveMemoBtn').onclick = async () => {
    const newMemo = document.getElementById('reviewMemoInput').value;
    const status = document.getElementById('memoStatus');
    status.textContent = '保存中…';
    try {
      drive.reviewMemo = newMemo;
      drive.updatedAt = new Date().toISOString();
      await saveDriveSafe(drive);
      status.textContent = '✓ 保存完了';
      setTimeout(() => status.textContent = '', 2000);
    } catch (e) {
      status.textContent = '✗ ' + e.message;
    }
  };
}

function renderPeriodTable(drive) {
  const pb = calcPeriodBreakdown(drive);
  const keys = ['morning', 'noon', 'evening', 'night'];
  const totalSales = keys.reduce((s, k) => s + pb[k].sales, 0);
  const totalCount = keys.reduce((s, k) => s + pb[k].count, 0);
  const totalTrip = keys.reduce((s, k) => s + pb[k].tripMin, 0);
  const totalRest = keys.reduce((s, k) => s + pb[k].restMin, 0);
  const totalPeriod = keys.reduce((s, k) => s + pb[k].periodMin, 0);
  const cell = (v) => `<td>${v}</td>`;
  const row = (label, valueFn) => `
    <tr>
      <td class="lbl">${label}</td>
      ${keys.map(k => cell(valueFn(pb[k]))).join('')}
      ${cell(valueFn({ sales: totalSales, count: totalCount, tripMin: totalTrip, restMin: totalRest, periodMin: totalPeriod }))}
    </tr>`;
  document.getElementById('periodCard').innerHTML = `
    <div class="muted">時間帯別サマリー</div>
    <div style="overflow-x:auto;">
    <table class="period-table">
      <thead><tr>
        <th class="lbl"></th>
        ${keys.map(k => `<th>${PERIOD_LABELS[k]}</th>`).join('')}
        <th>合計</th>
      </tr></thead>
      <tbody>
        ${row('営収(税込)', d => d.sales > 0 ? formatYen(d.sales) : '—')}
        ${row('件数', d => d.count || '—')}
        ${row('平均単価', d => d.count > 0 ? formatYen(d.sales / d.count) : '—')}
        ${row('実車時間', d => d.tripMin > 0 ? formatMin(d.tripMin) : '—')}
        ${row('時間単価', d => d.periodMin > 0 ? formatYen(d.sales / (d.periodMin/60)) : '—')}
        ${row('休憩時間', d => d.restMin > 0 ? formatMin(d.restMin) : '—')}
      </tbody>
    </table>
    </div>
  `;
}

function renderHourChart(drive) {
  const acts = hourlyActivity(drive, SHIFT_START_HOUR);
  // 0売上＆0休憩の時間帯は表示しない (帰庫後の0時間帯を省く)
  const filtered = acts.filter(a => a.sales > 0 || a.tripMin > 0 || a.restMin > 0);
  const maxSales = Math.max(...filtered.map(a => a.sales), 1);
  const REST_FULL = 60;
  const rows = filtered.map(a => {
    const salesPct = a.sales === 0 ? 0 : Math.max(2, (a.sales / maxSales) * 100);
    const restPct = a.restMin === 0 ? 0 : Math.max(2, (a.restMin / REST_FULL) * 100);
    const yenLabel = a.sales > 0 ? formatYen(a.sales) : '—';
    const restLabel = a.restMin > 0 ? `休${a.restMin}分` : '';
    const tripLabel = a.tripMin > 0 ? `実${a.tripMin}分` : '';
    return `<div class="hour-row">
      <div class="h">${shiftHour(a.hour)}時</div>
      <div class="barcell">
        <div class="bar-bg"><div class="bar sales" style="width:${salesPct}%"></div></div>
        <div class="bar-bg"><div class="bar rest" style="width:${restPct}%"></div></div>
      </div>
      <div class="vals">
        <div class="y">${yenLabel}</div>
        <div class="r">${[tripLabel, restLabel].filter(Boolean).join(' / ') || '—'}</div>
      </div>
    </div>`;
  }).join('') || '<p class="muted" style="font-size:11px;">tripなし</p>';
  const peakAct = filtered.length > 0 ? filtered.reduce((a, b) => a.sales >= b.sales ? a : b) : null;
  document.getElementById('hourCard').innerHTML = `
    <div class="muted">時間別 売上(緑) と 休憩(グレー) ・7時スタート、深夜は25時〜</div>
    <div class="hour-list">${rows}</div>
    ${peakAct ? `<div class="legend">ピーク売上: <strong>${shiftHour(peakAct.hour)}時台 ${formatYen(peakAct.sales)} (実車${peakAct.tripMin}分)</strong></div>` : ''}
  `;
}

function renderTripsTable(drive) {
  const trips = drive.trips || [];
  const rests = drive.rests || [];
  // 全エントリを時刻順に (7時始まり、深夜は25時以降扱い)
  const events = [];
  for (const t of trips) events.push({ kind: 'trip', t, start: t.boardTime, end: t.alightTime });
  for (const r of rests) events.push({ kind: 'rest', r, start: r.startTime, end: r.endTime });
  events.sort((a, b) => shiftedMinutes(a.start) - shiftedMinutes(b.start));

  // 各イベントの「次まで」 = 次イベントのshifted start - このイベントのshifted end
  const nextGap = (i) => {
    const cur = events[i];
    const next = events[i + 1];
    if (!cur?.end || !next?.start) return null;
    const g = shiftedMinutes(next.start) - shiftedMinutes(cur.end);
    return (g >= 0 && g < 12*60) ? g : null;
  };

  const rows = events.map((ev, i) => {
    const gap = nextGap(i);
    const gapStr = gap === null ? '—' : `${gap}分`;
    if (ev.kind === 'rest') {
      const r = ev.r;
      let dur = timeToMinutes(r.endTime) - timeToMinutes(r.startTime);
      if (dur < 0) dur += 24*60;
      return `<tr style="background:#f5f5f5;color:var(--muted);">
        <td>休</td><td>${shiftTimeStr(r.startTime)}</td><td>${shiftTimeStr(r.endTime)}</td><td class="r">${dur}分</td>
        <td>—</td><td class="place" colspan="2">${r.place || ''}</td><td class="r">—</td><td class="r">—</td><td class="r">${gapStr}</td>
      </tr>`;
    }
    const t = ev.t;
    let dur = timeToMinutes(t.alightTime) - timeToMinutes(t.boardTime);
    if (dur < 0) dur += 24*60;
    const cls = t.isCancel ? 'cancel' : (t.isCharter ? 'charter' : '');
    return `<tr class="${cls}">
      <td>${t.no}</td>
      <td>${shiftTimeStr(t.boardTime)}</td>
      <td>${shiftTimeStr(t.alightTime)}</td>
      <td class="r">${dur}分</td>
      <td>${t.isPickup ? '迎車' : ''}${t.isCharter ? '貸' : ''}</td>
      <td class="place" title="${t.boardPlace}">${t.boardPlace}</td>
      <td class="place" title="${t.alightPlace}">${t.alightPlace}${t.isCancel ? ' [×]' : ''}</td>
      <td class="r">${(t.km || 0).toFixed(1)}</td>
      <td class="r">${t.isCancel ? '—' : formatYen(t.amount)}</td>
      <td class="r">${gapStr}</td>
    </tr>`;
  }).join('');
  document.getElementById('tripsCard').innerHTML = `
    <div class="muted">日報明細</div>
    <div style="overflow-x:auto;">
    <table class="trip-table">
      <thead><tr>
        <th>No</th><th>乗車</th><th>降車</th><th class="r">時間</th>
        <th>種別</th><th>乗車地</th><th>降車地</th><th class="r">km</th><th class="r">金額</th><th class="r">次まで</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    </div>
    <div class="legend">区: 迎車=お客様の指定場所までお迎え / 貸=貸切。「次まで」=このイベント終了から次イベント開始までの空車時間。橙=キャンセル、薄橙背景=貸切</div>
  `;
}

async function renderDateNav(currentDate) {
  const host = document.getElementById('navDates');
  try {
    const files = await listFiles('data/drives');
    const dates = files
      .filter(f => f.name && f.name.endsWith('.json'))
      .map(f => f.name.replace('.json', ''))
      .sort();
    const idx = dates.indexOf(currentDate);
    const prev = idx > 0 ? dates[idx - 1] : null;
    const next = idx >= 0 && idx < dates.length - 1 ? dates[idx + 1] : null;
    const btn = (date, label, dir) => date
      ? `<a href="detail.html?date=${date}" class="btn" style="background:var(--gray);padding:6px 10px;font-size:12px;text-decoration:none;color:#333;flex:1;text-align:${dir};">${label}</a>`
      : `<span style="flex:1;"></span>`;
    host.innerHTML = `${btn(prev, '‹ 前の乗務 ' + (prev ? formatDate(prev) : ''), 'left')}${btn(next, (next ? formatDate(next) + ' ' : '') + '次の乗務 ›', 'right')}`;
  } catch (e) {
    host.innerHTML = '';
  }
}

if (localStorage.getItem('github_token') && localStorage.getItem('github_data_repo')) load();
</script>
</body>
</html>
