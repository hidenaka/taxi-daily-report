<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>管理者ツール — タクシー日報</title>
<link rel="stylesheet" href="css/style.css">
<style>
.admin-card { background: var(--surface); border-radius: 8px; padding: 14px; margin-bottom: 10px; border: 1px solid var(--border); }
.admin-card h3 { margin: 0 0 10px; font-size: 15px; }
.invite-result { background: #e8f5e9; border: 1px solid #4caf50; border-radius: 6px; padding: 12px; margin-top: 10px; }
.invite-result .url { font-family: monospace; font-size: 11px; word-break: break-all; background: #fff; padding: 8px; border-radius: 4px; margin: 8px 0; }
.user-list { margin-top: 8px; }
.user-list-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 13px; }
.user-list-item:last-child { border-bottom: none; }
.badge { font-size: 10px; padding: 2px 6px; border-radius: 3px; background: #e3f2fd; color: #1565c0; }
.badge.inactive { background: #eee; color: #999; }
.login-card { background: #fff3e0; border: 1px solid #ffcc80; border-radius: 8px; padding: 20px; margin-bottom: 10px; }
.login-card h3 { margin: 0 0 12px; font-size: 16px; color: #e65100; }
</style>
</head>
<body>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
}
</script>
<main style="padding:14px;">
  <h1>管理者ツール</h1>
  <p class="muted" style="font-size:12px;margin-bottom:12px;">ユーザー管理</p>

  <!-- ログインセクション -->
  <section class="login-card" id="loginSection">
    <h3>🔐 管理者ログイン</h3>
    <p class="muted" style="font-size:11px;margin-bottom:10px;">ID: admin / PW: admin でログイン</p>
    <label class="muted">ユーザーID</label>
    <input class="input" id="loginUserId" placeholder="admin" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
    <label class="muted" style="margin-top:8px;display:block;">パスワード</label>
    <input class="input" id="loginPassword" type="password" placeholder="admin" autocomplete="off">
    <button class="btn" id="loginBtn" style="margin-top:12px;width:100%;">ログイン</button>
    <div id="loginStatus" style="margin-top:8px;font-size:12px;"></div>
  </section>

  <!-- 管理者コンテンツ（ログイン後に表示） -->
  <div id="adminContent" style="display:none;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <div style="font-size:12px;">管理者: <strong id="adminName">--</strong></div>
      <button class="btn" id="logoutBtn" style="font-size:12px;padding:6px 12px;background:var(--gray);color:#333;">ログアウト</button>
    </div>

    <section class="admin-card">
      <h3>👤 新規ユーザー作成</h3>
      <p class="muted" style="font-size:11px;margin-bottom:8px;">メールアドレス不要。userId + パスワードでアカウント作成。</p>
      <label class="muted">ユーザーID</label>
      <input class="input" id="newUserId" placeholder="taro" pattern="^[a-z][a-z0-9_]*$" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
      <label class="muted" style="margin-top:8px;display:block;">初期パスワード</label>
      <input class="input" id="newUserPassword" type="password" placeholder="6文字以上" autocomplete="off">
      <label class="muted" style="margin-top:8px;display:block;">表示名（任意）</label>
      <input class="input" id="newUserDisplayName" placeholder="山田太郎" autocomplete="off">
      <button class="btn" id="createUserBtn" style="margin-top:10px;width:100%;">ユーザーを作成</button>
      <div id="createUserResult"></div>
    </section>

    <section class="admin-card">
      <h3>📋 使い方</h3>
      <ol style="font-size:12px;color:#666;padding-left:20px;margin:0;">
        <li>上のフォームに新規ユーザーのIDとパスワードを入力</li>
        <li>「ユーザーを作成」をクリック</li>
        <li>作成後、userIdとパスワードをユーザーに伝える</li>
        <li>ユーザーは settings.html でログインして使う</li>
      </ol>
    </section>

    <a href="index.html" style="display:block;text-align:center;padding:10px;color:var(--primary);text-decoration:none;font-size:14px;">← ホームに戻る</a>
  </div>
</main>

<script type="module">
import { loginWithUserId, logout, getCurrentUser } from './js/firebase-auth.js';
import { createUserWithCredentials } from './js/firebase-auth.js';
import { getMyUserId } from './js/storage.js';

const loginSection = document.getElementById('loginSection');
const adminContent = document.getElementById('adminContent');
const loginStatus = document.getElementById('loginStatus');

// 既存のメール認証ユーザーがadminかチェック
function checkAdmin() {
  const user = getCurrentUser();
  if (user && !user.isAnonymous) {
    const email = user.email || '';
    const userId = email.split('@')[0];
    if (userId === 'admin') {
      showAdminUI(userId);
      return true;
    }
  }
  return false;
}

function showAdminUI(userId) {
  loginSection.style.display = 'none';
  adminContent.style.display = '';
  document.getElementById('adminName').textContent = userId;
}

function showLoginUI() {
  loginSection.style.display = '';
  adminContent.style.display = 'none';
}

// 初期表示
if (!checkAdmin()) {
  showLoginUI();
}

// ログイン
document.getElementById('loginBtn').onclick = async () => {
  const userId = document.getElementById('loginUserId').value.trim();
  const password = document.getElementById('loginPassword').value;
  
  if (!userId || !password) {
    loginStatus.textContent = '✗ IDとパスワードを入力してください';
    loginStatus.style.color = '#d32f2f';
    return;
  }
  
  loginStatus.textContent = 'ログイン中…';
  loginStatus.style.color = '';
  
  const res = await loginWithUserId(userId, password);
  if (res.success) {
    if (userId === 'admin') {
      loginStatus.textContent = '✓ ログイン成功';
      loginStatus.style.color = 'green';
      showAdminUI(userId);
    } else {
      loginStatus.textContent = '✗ 管理者権限がありません';
      loginStatus.style.color = '#d32f2f';
      await logout();
    }
  } else {
    loginStatus.textContent = '✗ ' + res.error;
    loginStatus.style.color = '#d32f2f';
  }
};

// ログアウト
document.getElementById('logoutBtn').onclick = async () => {
  await logout();
  showLoginUI();
};

// 新規ユーザー作成
document.getElementById('createUserBtn').onclick = async () => {
  const btn = document.getElementById('createUserBtn');
  const result = document.getElementById('createUserResult');
  const userId = document.getElementById('newUserId').value.trim();
  const password = document.getElementById('newUserPassword').value;
  const displayName = document.getElementById('newUserDisplayName').value.trim();

  if (!userId || !password) {
    result.innerHTML = '<p style="color:#d32f2f;font-size:12px;">userIdとパスワードを入力してください</p>';
    return;
  }
  if (password.length < 6) {
    result.innerHTML = '<p style="color:#d32f2f;font-size:12px;">パスワードは6文字以上にしてください</p>';
    return;
  }

  btn.disabled = true;
  btn.textContent = '作成中…';
  result.innerHTML = '';

  try {
    const res = await createUserWithCredentials(userId, password);
    if (res.success) {
      result.innerHTML = `
        <div class="invite-result">
          <strong>✓ ユーザー作成完了</strong>
          <p style="font-size:12px;margin:6px 0;">userId: <strong>${userId}</strong></p>
          <p style="font-size:11px;color:#666;">パスワード: ${password.replace(/./g, '•')}</p>
          <p class="muted" style="font-size:10px;margin-top:6px;">ユーザーにuserIdとパスワードを伝えてください。</p>
        </div>
      `;
      document.getElementById('newUserId').value = '';
      document.getElementById('newUserPassword').value = '';
      document.getElementById('newUserDisplayName').value = '';
    } else {
      result.innerHTML = `<p style="color:#d32f2f;font-size:12px;">エラー: ${res.error}</p>`;
    }
  } catch (e) {
    result.innerHTML = `<p style="color:#d32f2f;font-size:12px;">エラー: ${e.message}</p>`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'ユーザーを作成';
  }
};
</script>
</body>
</html>
