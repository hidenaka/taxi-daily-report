<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>管理者ツール — タクシー日報</title>
<link rel="stylesheet" href="css/style.css">
<style>
.admin-card { background: var(--surface); border-radius: 8px; padding: 14px; margin-bottom: 10px; border: 1px solid var(--border); }
.admin-card h3 { margin: 0 0 10px; font-size: 15px; }
.invite-result { background: #e8f5e9; border: 1px solid #4caf50; border-radius: 6px; padding: 12px; margin-top: 10px; }
.invite-result .url { font-family: monospace; font-size: 11px; word-break: break-all; background: #fff; padding: 8px; border-radius: 4px; margin: 8px 0; }
.user-list { margin-top: 8px; }
.user-list-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 13px; }
.user-list-item:last-child { border-bottom: none; }
.badge { font-size: 10px; padding: 2px 6px; border-radius: 3px; background: #e3f2fd; color: #1565c0; }
.badge.inactive { background: #eee; color: #999; }
</style>
</head>
<body>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
}
</script>
<main style="padding:14px;">
  <h1>管理者ツール</h1>
  <p class="muted" style="font-size:12px;margin-bottom:12px;">ユーザー招待・管理</p>

  <section class="admin-card">
    <h3>👥 ユーザー一覧</h3>
    <div id="userList" class="user-list">読み込み中…</div>
  </section>

  <section class="admin-card">
    <h3>🎟️ 招待リンク生成</h3>
    <label class="muted">ユーザーID</label>
    <input class="input" id="inviteUserId" placeholder="mm" pattern="^[a-z][a-z0-9_]*$" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
    <label class="muted" style="margin-top:8px;display:block;">新規ユーザーのPAT（repo権限）</label>
    <input class="input" id="invitePat" type="password" placeholder="github_pat_xxx" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
    <label class="muted" style="margin-top:8px;display:block;">有効期限</label>
    <select class="select" id="inviteTtl">
      <option value="24">24時間</option>
      <option value="72" selected>72時間（3日）</option>
      <option value="168">7日</option>
      <option value="720">30日</option>
    </select>
    <button class="btn" id="generateBtn" style="margin-top:10px;width:100%;">招待リンクを生成</button>
    <div id="inviteResult"></div>
  </section>

  <section class="admin-card">
    <h3>👤 新規ユーザー作成（Firebase認証）</h3>
    <p class="muted" style="font-size:11px;margin-bottom:8px;">メールアドレス不要。userId + パスワードでアカウント作成。</p>
    <label class="muted">ユーザーID</label>
    <input class="input" id="newUserId" placeholder="taro" pattern="^[a-z][a-z0-9_]*$" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
    <label class="muted" style="margin-top:8px;display:block;">初期パスワード</label>
    <input class="input" id="newUserPassword" type="password" placeholder="8文字以上" autocomplete="off">
    <label class="muted" style="margin-top:8px;display:block;">表示名（任意）</label>
    <input class="input" id="newUserDisplayName" placeholder="山田太郎" autocomplete="off">
    <button class="btn" id="createUserBtn" style="margin-top:10px;width:100%;">ユーザーを作成</button>
    <div id="createUserResult"></div>
  </section>

  <section class="admin-card">
    <h3>📋 使い方</h3>
    <ol style="font-size:12px;color:#666;padding-left:20px;margin:0;">
      <li>上のフォームに新規ユーザーのIDとPATを入力</li>
      <li>「招待リンクを生成」をクリック</li>
      <li>生成されたURLをコピーして相手に送る</li>
      <li>相手はURLを開くだけで自動設定される</li>
    </ol>
    <p class="muted" style="font-size:11px;margin-top:8px;">※ URLの <code>#key=...</code> 以降は絶対に共有しないこと（暗号化鍵が含まれている）</p>
  </section>

  <a href="settings.html" style="display:block;text-align:center;padding:10px;color:var(--primary);text-decoration:none;font-size:14px;">← 設定画面に戻る</a>
</main>

<script type="module">
import { getMyUserId } from './js/storage.js';
import { generateInvite, fetchUsers } from './js/admin-invite.js';
import { createUserWithCredentials } from './js/firebase-auth.js';

// 管理者チェック
const myId = getMyUserId();
if (myId !== 'user_self') {
  document.querySelector('main').innerHTML = '<div style="padding:30px;text-align:center;color:#d32f2f;">このページは管理者（user_self）のみ使用できます</div>';
}

// ユーザー一覧表示
async function loadUsers() {
  const users = await fetchUsers();
  const container = document.getElementById('userList');
  if (users.length === 0) {
    container.innerHTML = '<p class="muted">ユーザーが見つかりません</p>';
    return;
  }
  container.innerHTML = users.map(u => `
    <div class="user-list-item">
      <span><strong>${u.userId}</strong> ${u.displayName ? `(${u.displayName})` : ''}</span>
      <span class="badge ${u.active ? '' : 'inactive'}">${u.active ? '有効' : '無効'}</span>
    </div>
  `).join('');
}

// 招待リンク生成
document.getElementById('generateBtn').onclick = async () => {
  const btn = document.getElementById('generateBtn');
  const result = document.getElementById('inviteResult');
  const userId = document.getElementById('inviteUserId').value.trim();
  const pat = document.getElementById('invitePat').value.trim();
  const ttl = parseInt(document.getElementById('inviteTtl').value);

  if (!userId || !pat) {
    result.innerHTML = '<p style="color:#d32f2f;font-size:12px;">userIdとPATを入力してください</p>';
    return;
  }

  btn.disabled = true;
  btn.textContent = '生成中…';
  result.innerHTML = '';

  try {
    const { inviteUrl, code, expiresAt } = await generateInvite({ userId, pat, ttlHours: ttl });
    const expDate = new Date(expiresAt).toLocaleString('ja-JP');

    result.innerHTML = `
      <div class="invite-result">
        <strong>✓ 招待リンク生成完了</strong>
        <div class="url">${inviteUrl}</div>
        <div style="display:flex;gap:6px;">
          <button class="btn" id="copyBtn" style="flex:1;font-size:12px;padding:6px;">📋 URLをコピー</button>
        </div>
        <p class="muted" style="font-size:10px;margin-top:6px;">コード: ${code} | 有効期限: ${expDate}</p>
      </div>
    `;

    document.getElementById('copyBtn').onclick = async () => {
      await navigator.clipboard.writeText(inviteUrl);
      document.getElementById('copyBtn').textContent = '✓ コピーしました';
      setTimeout(() => document.getElementById('copyBtn').textContent = '📋 URLをコピー', 1500);
    };

    // フォームクリア
    document.getElementById('invitePat').value = '';
    loadUsers(); // 一覧更新
  } catch (e) {
    result.innerHTML = `<p style="color:#d32f2f;font-size:12px;">エラー: ${e.message}</p>`;
  } finally {
    btn.disabled = false;
    btn.textContent = '招待リンクを生成';
  }
};

// 新規ユーザー作成
document.getElementById('createUserBtn').onclick = async () => {
  const btn = document.getElementById('createUserBtn');
  const result = document.getElementById('createUserResult');
  const userId = document.getElementById('newUserId').value.trim();
  const password = document.getElementById('newUserPassword').value;
  const displayName = document.getElementById('newUserDisplayName').value.trim();

  if (!userId || !password) {
    result.innerHTML = '<p style="color:#d32f2f;font-size:12px;">userIdとパスワードを入力してください</p>';
    return;
  }
  if (password.length < 6) {
    result.innerHTML = '<p style="color:#d32f2f;font-size:12px;">パスワードは6文字以上にしてください</p>';
    return;
  }

  btn.disabled = true;
  btn.textContent = '作成中…';
  result.innerHTML = '';

  try {
    const res = await createUserWithCredentials(userId, password);
    if (res.success) {
      result.innerHTML = `
        <div class="invite-result">
          <strong>✓ ユーザー作成完了</strong>
          <p style="font-size:12px;margin:6px 0;">userId: <strong>${userId}</strong></p>
          <p style="font-size:11px;color:#666;">パスワード: ${password.replace(/./g, '•')}</p>
          <p class="muted" style="font-size:10px;margin-top:6px;">ユーザーにuserIdとパスワードを伝えてください。</p>
        </div>
      `;
      document.getElementById('newUserId').value = '';
      document.getElementById('newUserPassword').value = '';
      document.getElementById('newUserDisplayName').value = '';
      loadUsers(); // 一覧更新
    } else {
      result.innerHTML = `<p style="color:#d32f2f;font-size:12px;">エラー: ${res.error}</p>`;
    }
  } catch (e) {
    result.innerHTML = `<p style="color:#d32f2f;font-size:12px;">エラー: ${e.message}</p>`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'ユーザーを作成';
  }
};

loadUsers();
</script>
</body>
</html>
