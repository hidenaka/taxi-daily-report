<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>カレンダー — タクシー日報</title>
<link rel="stylesheet" href="css/style.css">
<style>
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-top: 6px; }
.cal-cell { padding: 12px 0; text-align: center; background: #fff; border-radius: 4px; font-size: 14px; cursor: pointer; user-select: none; border: 1px solid #eee; }
.cal-cell.planned { background: var(--green); color: #fff; font-weight: 600; border-color: var(--green); }
.cal-cell.actual { background: var(--primary); color: #fff; font-weight: 600; border-color: var(--primary); }
.cal-cell.paidleave { background: #ce93d8; color: #fff; font-weight: 600; border-color: #8e24aa; }
.cal-cell.today { box-shadow: 0 0 0 2px #f57f17 inset; }
.cal-cell.dim { color: #ccc; background: transparent; border: none; cursor: default; }
.dow-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; font-size: 11px; color: var(--muted); text-align: center; }
.dow-toggle { display: inline-block; padding: 6px 12px; margin: 3px; border: 1px solid var(--border); border-radius: 16px; cursor: pointer; background: #fff; font-size: 13px; }
.dow-toggle.on { background: var(--green); color: #fff; border-color: var(--green); font-weight: 600; }
.help { font-size: 11px; color: var(--muted); background: #f5f5f5; padding: 8px; border-radius: 4px; margin-top: 6px; line-height: 1.5; }
</style>
</head>
<body>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
}
// GitHub版廃止: 古いtoken/repoが残っていれば削除
localStorage.removeItem('github_token');
localStorage.removeItem('github_data_repo');

// 開発環境バッジ
if (location.hostname.includes('-dev')) {
  document.addEventListener('DOMContentLoaded', () => {
    const badge = document.createElement('div');
    badge.textContent = '🚧 開発環境';
    badge.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#ff9800;color:#fff;padding:4px 8px;font-size:11px;text-align:center;font-weight:600;z-index:9999;';
    document.body.appendChild(badge);
  });
}
</script>
<main style="padding:14px;">
  <h1>シフトカレンダー</h1>

  <section class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <button class="btn" id="prevBtn" style="background:var(--gray);">‹ 前月</button>
      <strong id="monthLabel"></strong>
      <button class="btn" id="nextBtn" style="background:var(--gray);">翌月 ›</button>
    </div>
    <div class="dow-row" style="margin-top:10px;">
      <div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div style="margin-top:12px;font-size:11px;display:flex;gap:8px;flex-wrap:wrap;">
      <span><span style="display:inline-block;width:10px;height:10px;background:var(--primary);border-radius:2px;"></span> 実績</span>
      <span><span style="display:inline-block;width:10px;height:10px;background:var(--green);border-radius:2px;"></span> 予定</span>
      <span><span style="display:inline-block;width:10px;height:10px;background:#ce93d8;border-radius:2px;"></span> 有給</span>
      <span><span style="display:inline-block;width:10px;height:10px;background:#fff;box-shadow:0 0 0 2px #f57f17 inset;border-radius:2px;"></span> 今日</span>
    </div>
    <p class="help">タップで「未→予定→有給→未」と循環。実績入力済の日（青）は変更不可。</p>
  </section>

  <section class="card">
    <h3>曜日で予定を一括追加</h3>
    <p class="help" style="margin-top:0;margin-bottom:8px;">出番にしたい曜日をオン。月内の該当曜日が予定に追加される（実績・既存予定は維持）。<br>オフにしても既存の予定は消えない（個別タップで解除）。</p>
    <div id="dowToggles"></div>
  </section>

  <section class="card">
    <h3>月サマリー</h3>
    <div id="summary"></div>
  </section>
</main>
<div id="navHost"></div>
<script type="module">
import { renderBottomNav, formatYen, todayIso, toLocalIso, currentBillingPeriod, getBillingPeriodRange, formatBillingPeriod, shiftBillingPeriod } from './js/app.js';
import { getConfig, saveConfig, getDrivesForMonth } from './js/storage.js';

document.getElementById('navHost').innerHTML = renderBottomNav('calendar');

let viewPeriod = currentBillingPeriod();
let config = null;
let drivesThisMonth = [];

const DOW = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'];

async function load() {
  config = await getConfig();
  if (!config) return alert('config.json未取得');
  await render();
}

async function render() {
  document.getElementById('monthLabel').textContent = formatBillingPeriod(viewPeriod);
  drivesThisMonth = await getDrivesForMonth(viewPeriod);
  renderGrid();
  renderDowToggles();
  renderSummary();
}

function isPlanned(date) {
  return config.shifts.expandedDates.includes(date);
}

function isPaidLeave(date) {
  return (config.shifts.paidLeaveDates || []).includes(date);
}

function isActual(date) {
  return drivesThisMonth.some(d => d.date === date);
}

function eachDateInRange(start, end) {
  const dates = [];
  const s = new Date(start + 'T00:00:00+09:00');
  const e = new Date(end + 'T00:00:00+09:00');
  for (let d = new Date(s); d <= e; d.setDate(d.getDate() + 1)) {
    dates.push(toLocalIso(d));
  }
  return dates;
}

function renderGrid() {
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  const { start, end } = getBillingPeriodRange(viewPeriod);
  const periodDates = eachDateInRange(start, end);

  // 期間開始日の曜日に合わせて前のセルを空欄で埋める
  const firstDate = new Date(start + 'T00:00:00+09:00');
  const startDow = firstDate.getDay();
  for (let i = 0; i < startDow; i++) {
    const d = document.createElement('div');
    d.className = 'cal-cell dim';
    d.textContent = '';
    grid.appendChild(d);
  }

  for (const iso of periodDates) {
    const day = parseInt(iso.split('-')[2]);
    const cell = document.createElement('div');
    cell.className = 'cal-cell';
    const hasActual = isActual(iso);
    if (hasActual) cell.classList.add('actual');
    else if (isPaidLeave(iso)) cell.classList.add('paidleave');
    else if (isPlanned(iso)) cell.classList.add('planned');
    if (iso === todayIso()) cell.classList.add('today');
    cell.textContent = day;
    if (hasActual) {
      cell.style.cursor = 'pointer';
      cell.onclick = () => location.href = `detail.html?date=${iso}`;
    } else {
      cell.onclick = () => cycleStatus(iso);
    }
    grid.appendChild(cell);
  }
}

// 状態循環: 未 → 予定 → 有給 → 未
async function cycleStatus(iso) {
  if (isActual(iso)) return alert('実績入力済の日は変更できません');
  if (!config.shifts.paidLeaveDates) config.shifts.paidLeaveDates = [];
  const planned = config.shifts.expandedDates;
  const paid = config.shifts.paidLeaveDates;
  const isP = planned.includes(iso);
  const isL = paid.includes(iso);
  if (!isP && !isL) {
    planned.push(iso); planned.sort();
  } else if (isP && !isL) {
    planned.splice(planned.indexOf(iso), 1);
    paid.push(iso); paid.sort();
  } else {
    paid.splice(paid.indexOf(iso), 1);
  }
  await saveConfig(config);
  await render();
}

function renderDowToggles() {
  const host = document.getElementById('dowToggles');
  host.innerHTML = '';
  ['日','月','火','水','木','金','土'].forEach((label, i) => {
    const dow = DOW[i];
    const isOn = config.shifts.patterns.includes(dow);
    const btn = document.createElement('span');
    btn.className = 'dow-toggle' + (isOn ? ' on' : '');
    btn.textContent = label;
    btn.onclick = async () => {
      const idx = config.shifts.patterns.indexOf(dow);
      if (idx >= 0) config.shifts.patterns.splice(idx, 1); else config.shifts.patterns.push(dow);
      // 当月度のexpandedDatesに該当曜日を全展開（実績済以外）
      const { start, end } = getBillingPeriodRange(viewPeriod);
      for (const iso of eachDateInRange(start, end)) {
        const dt = new Date(iso + 'T00:00:00+09:00');
        const dowName = DOW[dt.getDay()];
        if (config.shifts.patterns.includes(dowName) && !config.shifts.expandedDates.includes(iso) && !isActual(iso)) {
          config.shifts.expandedDates.push(iso);
        }
      }
      config.shifts.expandedDates.sort();
      await saveConfig(config);
      await render();
    };
    host.appendChild(btn);
  });
}

function renderSummary() {
  const { start, end } = getBillingPeriodRange(viewPeriod);
  const planned = config.shifts.expandedDates.filter(d => d >= start && d <= end).length;
  const paid = (config.shifts.paidLeaveDates || []).filter(d => d >= start && d <= end).length;
  const actual = drivesThisMonth.length;
  const remaining = Math.max(0, planned - actual);
  const futurePlanned = config.shifts.expandedDates.filter(d => d >= start && d <= end && d >= todayIso()).length;
  const willMakeResp = (actual + futurePlanned) >= config.responsibilityShifts;
  const paidAmount = paid * (config.paidLeaveAmount || 0);
  document.getElementById('summary').innerHTML = `
    <div>予定: <strong>${planned}乗務</strong></div>
    <div>実績: <strong>${actual}乗務</strong></div>
    <div>残り: <strong>${remaining}乗務</strong></div>
    <div>有給: <strong>${paid}日</strong> ${paid > 0 ? `(¥${paidAmount.toLocaleString()})` : ''}</div>
    <div style="color:${willMakeResp ? 'var(--primary)' : 'var(--orange)'}">責任出番達成見込み: <strong>${willMakeResp ? '○' : '△'} (${actual + remaining}/${config.responsibilityShifts})</strong></div>
  `;
}

document.getElementById('prevBtn').onclick = () => {
  viewPeriod = shiftBillingPeriod(viewPeriod, -1);
  render();
};
document.getElementById('nextBtn').onclick = () => {
  viewPeriod = shiftBillingPeriod(viewPeriod, 1);
  render();
};

load();
</script>
</body>
</html>
